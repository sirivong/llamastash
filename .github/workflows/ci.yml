name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.os }}, ${{ matrix.features }})
    strategy:
      fail-fast: false
      matrix:
        # Run clippy on macOS too so the `cfg(target_os = "macos")`
        # branches (peercred via getpeereid, $TMPDIR runtime fallback,
        # pbcopy clipboard) get lint-checked pre-merge instead of
        # waiting for the release tarball to surface a regression.
        os: [ubuntu-latest, macos-latest]
        # Run with and without `uat` so neither side rots:
        # - `test-fixtures` alone is the shape the release binary ships.
        # - `test-fixtures,uat` compiles `src/cli/uat/*` (gated behind
        #   `#[cfg(feature = "uat")]`) and lint-checks the maintainer-only
        #   surface. Cheap insurance — UAT module sits behind one cfg
        #   gate, and a future change that accidentally couples non-UAT
        #   code to a UAT-only item gets caught here, not when a release
        #   binary refuses to build.
        features: ["test-fixtures", "test-fixtures,uat"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --features ${{ matrix.features }} -- -D warnings

  test:
    name: test (${{ matrix.os }}, ${{ matrix.features }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # See `clippy` for the feature-matrix rationale. The `uat`
        # feature adds ~52 hermetic tests (unit + `tests/uat_lifecycle_test.rs`
        # backend-mismatch path); none of them require a GPU because
        # pre-flight fails before any subprocess spawns. The full
        # GPU-touching lifecycle lives on the nightly Metal lane plus
        # maintainer-run per-release UAT — never on PR CI.
        features: ["test-fixtures", "test-fixtures,uat"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --features ${{ matrix.features }} --workspace
        env:
          RUST_BACKTRACE: 1

  cross-aarch64:
    name: cross-compile aarch64-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: install cross-linker
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: cargo check
        run: cargo check --target aarch64-unknown-linux-gnu --release
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

  actionlint:
    # Static analysis for the workflow YAML themselves. Catches expression
    # mistakes, shell quoting bugs, deprecated keywords, and similar shape
    # issues that would otherwise only surface when a release.yml regression
    # detonates mid-tag.
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install actionlint + shellcheck
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y shellcheck
          # Pin to a specific actionlint release for reproducibility.
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash \
            | bash -s -- 1.7.7
          ./actionlint -version
      - name: actionlint
        run: ./actionlint -color

  release-readiness:
    # Pre-tag guards that catch release-breaking PRs *before* a maintainer
    # cuts a tag. Each check is cheap and fast; running them on every PR
    # means the release workflow never fails for reasons a PR could have
    # surfaced.
    name: release readiness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: cargo publish --dry-run
        # Validates Cargo.toml manifest shape, license, README presence, and
        # the published file set. Does NOT verify crate-name availability.
        run: cargo publish --dry-run --locked

      - name: crate-name availability
        # Per plan R86: confirm `llamastash` is unclaimed on crates.io, or if
        # claimed, owned by the publishing maintainer (d4udts@gmail.com /
        # deepu105 — the same account that will hold CRATES_IO_TOKEN). We
        # query crates.io directly and check the owners list against an
        # allowlist that's expanded in this file rather than via a token-
        # gated GitHub API call.
        #
        # Why no `gh api /orgs/.../members`: that endpoint with the default
        # GITHUB_TOKEN can only see *publicly visible* members. If the org's
        # members default to private membership, the result is an empty list
        # and the guard fires on every PR after first publish (the exact
        # opposite of what we want). A small allowlist captures the
        # invariant we actually care about: "is the publisher one of us."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          crate="llamastash"
          # Publisher allowlist — bump if the publishing account changes.
          # GitHub login of every llamastash member who could hold the
          # CRATES_IO_TOKEN. Crates.io owner logins are case-insensitive.
          publisher_allowlist=(
            "deepu105"
          )

          tmp=$(mktemp)
          trap 'rm -f "$tmp"' EXIT

          http_code=$(curl --silent --show-error --location --max-time 15 \
            --user-agent "llamastash-ci-name-check" \
            --output "$tmp" \
            --write-out '%{http_code}' \
            "https://crates.io/api/v1/crates/${crate}")

          case "$http_code" in
            404)
              echo "crate name '${crate}' is unclaimed on crates.io; OK"
              exit 0
              ;;
            200) ;;
            *)
              echo "::error::crates.io returned HTTP $http_code for /api/v1/crates/${crate}"
              cat "$tmp"
              exit 1
              ;;
          esac

          # 200 — crate exists. Extract owner logins and check against the
          # allowlist. The /api/v1/crates/<name> response carries them at
          # `.crate.owners[].login`.
          owners=$(python3 -c '
          import json, sys
          d = json.load(open(sys.argv[1]))
          for owner in d.get("crate", {}).get("owners", []) or []:
              print(owner.get("login", ""))
          ' "$tmp")

          echo "crates.io owners for ${crate}: ${owners:-<none>}"
          if [ -z "$owners" ]; then
            echo "::error::Crate exists but reports no owners. Inspect manually."
            exit 1
          fi

          for owner in $owners; do
            for allowed in "${publisher_allowlist[@]}"; do
              if [ "${owner,,}" = "${allowed,,}" ]; then
                echo "owner '$owner' is in the publisher allowlist; OK"
                exit 0
              fi
            done
          done

          echo "::error::crate '${crate}' is claimed by an owner outside the publisher allowlist:"
          echo "::error::  owners: ${owners}"
          echo "::error::  allowed: ${publisher_allowlist[*]}"
          echo "::error::Fall back to the 'llamastash-cli' rename path per plan R87."
          exit 1

      - name: url-grep-guard
        # Refuse PRs that re-introduce any pre-rename GitHub URL. This project
        # went through two renames before v1.0:
        #   1. github.com/llamadash/llamadash     → github.com/llamadash-rs/llamadash
        #   2. github.com/llamadash-rs/llamadash  → github.com/llamastash/llamastash (current)
        # Both legacy patterns are blocked from creeping back into user-visible
        # files. Excludes docs/brainstorms + docs/plans + docs/solutions, which
        # preserve the historical record. Discover the file set dynamically via
        # `git ls-files` so adding or removing a top-level doc doesn't silently
        # bypass the check or abort on missing files.
        run: |
          set -euo pipefail
          mapfile -t candidates < <(git ls-files \
            'Cargo.toml' '*.md' \
            ':!:docs/brainstorms/**' \
            ':!:docs/plans/**' \
            ':!:docs/solutions/**')
          if [ "${#candidates[@]}" -eq 0 ]; then
            echo "::error::URL guard found no files to scan; the glob must have lost coverage."
            exit 1
          fi
          if grep -HnE 'github\.com/(llamadash|llamadash-rs)/llamadash' "${candidates[@]}"; then
            echo "::error::Pre-rename URL found in user-visible files."
            echo "::error::Use github.com/llamastash/llamastash."
            exit 1
          fi
          printf 'scanned %d file(s); no stray pre-rename URLs; OK\n' "${#candidates[@]}"

      - name: changelog has unreleased or current-version heading
        # On PRs we just want SOMETHING under [Unreleased]; on tag-builds the
        # release workflow itself checks for the version heading. Here, fail
        # if the [Unreleased] section is missing entirely.
        run: |
          set -euo pipefail
          if ! grep -q '^## \[Unreleased\]' CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing the [Unreleased] section header."
            exit 1
          fi
          echo "[Unreleased] heading present; OK"

      - name: Cargo.toml ↔ CHANGELOG version alignment
        # If Cargo.toml's version is not -dev (i.e. it has been bumped for a
        # release), CHANGELOG.md must already have a matching section.
        run: |
          set -euo pipefail
          version=$(awk -F\" '/^version[[:space:]]*=/ {print $2; exit}' Cargo.toml)
          if [[ "$version" == *-dev ]]; then
            echo "Cargo.toml is at a -dev version; skipping CHANGELOG alignment check"
            exit 0
          fi
          if ! grep -Eq "^## \[${version}\]" CHANGELOG.md; then
            echo "::error::Cargo.toml is at ${version} but CHANGELOG.md has no [${version}] section."
            echo "::error::Either promote [Unreleased] to [${version}], or revert the Cargo.toml bump."
            exit 1
          fi
          echo "Cargo.toml ${version} matches CHANGELOG [${version}]; OK"

      - name: packager.py unit tests
        # Catches template / argv regressions in the homebrew packager before
        # the release workflow tries to use it.
        run: python3 deployment/homebrew/packager_test.py

      - name: uat — R4 audit (release binary never carries --features uat)
        # The shipped binary on crates.io / Homebrew must not carry the
        # maintainer-only `uat` Cargo feature. Plan §R4 + `release.yml`'s
        # build-step comment both document this. A non-comment match
        # means somebody added `--features uat` to the release build.
        run: |
          set -euo pipefail
          if grep -nE '^[^#]*--features[[:space:]]+uat' .github/workflows/release.yml; then
            echo "::error::release.yml carries '--features uat' in a non-comment line — that ships the maintainer-only UAT subcommand to end users."
            exit 1
          fi
          echo "R4: release.yml does not pass --features uat to the build step; OK"

      - name: uat — synthetic exit codes documented
        # Agents parsing `failure_summary.exit_code` rely on the synthetic
        # code table in docs/testing/hardware-uat.md. Each crate-private
        # constant in src/cli/uat/lifecycle.rs must appear in the doc so
        # downstream tooling never sees an undocumented magic number.
        run: |
          set -euo pipefail
          doc=docs/testing/hardware-uat.md
          for sym in PREFLIGHT_MISMATCH_CODE SMOKE_HTTP_ERROR_CODE \
                     SMOKE_PARSE_ERROR_CODE SMOKE_STATUS_ERROR_CODE \
                     TIMEOUT_CODE SIGINT_CODE; do
            if ! grep -qF "$sym" "$doc"; then
              echo "::error::synthetic exit-code constant $sym is missing from $doc"
              exit 1
            fi
          done
          echo "all synthetic UAT exit-code constants are documented in $doc; OK"

      - name: uat — nightly workflow carries ce-review fix lock-ins
        # Three ce-review fixes that have textual signatures in the
        # nightly workflow. Reverting any of them silently would
        # re-introduce a flagged regression class — guard accordingly.
        #
        # M-P2-12: gh issue body via --body-file (shell-escape safe).
        # M-P3-05: gh issue list with --limit 1 + title filter.
        # M-P3-07: brew formula version folded into the cache key.
        # M-P2-07: HF cache path is the stable runner root, not the
        #          ephemeral sandbox HF_HOME under /tmp.
        run: |
          set -euo pipefail
          nightly=.github/workflows/uat-metal-nightly.yml
          if [ ! -f "$nightly" ]; then
            echo "::notice::$nightly absent — skipping UAT nightly shape audit (spike-fail collapse path)"
            exit 0
          fi
          fail=0
          if ! grep -qF -- "--body-file" "$nightly"; then
            echo "::error::$nightly: gh issue comment must use --body-file (ce-review M-P2-12)"
            fail=1
          fi
          if ! grep -qF -- "--limit 1" "$nightly"; then
            echo "::error::$nightly: gh issue list must use --limit 1 (ce-review M-P3-05)"
            fail=1
          fi
          if ! grep -qF "brew info" "$nightly"; then
            echo "::error::$nightly: brew formula version must be folded into the cache key (ce-review M-P3-07)"
            fail=1
          fi
          # The HF cache path on `actions/cache@v4` must NOT be the
          # default `~/.cache/huggingface/hub` — the UAT sandbox redirects
          # HF_HOME, so caching the default path is a permanent miss
          # (M-P2-07).
          if grep -qE 'path:.*~/\.cache/huggingface/hub' "$nightly"; then
            echo "::error::$nightly: cache must target the stable HF root (steps.hf-cache.outputs.dir), not ~/.cache/huggingface/hub (ce-review M-P2-07)"
            fail=1
          fi
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "uat-metal-nightly.yml carries every ce-review fix signature; OK"

  install-sh-lint:
    # POSIX-strict lint of scripts/install.sh. The script targets Bash 3.2+
    # (macOS default) but POSIX is a stricter superset, so -s sh catches
    # portability issues the Bash 3 runtime would silently tolerate.
    name: shellcheck install.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck -s sh
        run: shellcheck -s sh scripts/install.sh

  install-sh-test:
    # Run the bats integration tests on both Linux and macOS so each platform's
    # native install path (target detection + uname mapping + tarball fetch +
    # checksum verify + extract) gets real-world coverage, not just simulation.
    name: bats install.sh (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: install bats (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: install bats (macos)
        if: runner.os == 'macOS'
        run: brew install bats-core
      - name: bats scripts/install.test.bats
        run: bats --tap scripts/install.test.bats
