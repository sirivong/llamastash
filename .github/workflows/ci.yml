name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # Workaround for making GitHub Actions skip based on commit message `[skip ci]`.
  prepare:
    runs-on: ubuntu-latest
    if: |
      !contains(format('{0} {1} {2}', github.event.head_commit.message, github.event.pull_request.title, github.event.pull_request.body), '[skip ci]')
    steps:
      - run: |
          cat <<'MESSAGE'
          github.event_name: ${{ toJson(github.event_name) }}
          github.event:
          ${{ toJson(github.event) }}
          MESSAGE

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (${{ matrix.os }}, ${{ matrix.features }})
    strategy:
      fail-fast: false
      matrix:
        # Run clippy on macOS and Windows too so the `cfg(target_os …)`
        # branches (macOS peercred via getpeereid; Windows Job Object /
        # LockFileEx / DACL) get lint-checked pre-merge instead of waiting
        # for the release matrix to surface a regression.
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Run with and without `uat` so neither side rots:
        # - `test-fixtures` alone is the shape the release binary ships.
        # - `test-fixtures,uat` compiles `src/cli/uat/*` (gated behind
        #   `#[cfg(feature = "uat")]`) and lint-checks the maintainer-only
        #   surface. Cheap insurance — UAT module sits behind one cfg
        #   gate, and a future change that accidentally couples non-UAT
        #   code to a UAT-only item gets caught here, not when a release
        #   binary refuses to build.
        features: ["test-fixtures", "test-fixtures,uat"]
    runs-on: ${{ matrix.os }}
    needs: prepare
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --features ${{ matrix.features }} -- -D warnings

  test:
    name: test (${{ matrix.os }}, ${{ matrix.features }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # See `clippy` for the feature-matrix rationale. The `uat`
        # feature adds ~52 hermetic tests (unit + `tests/uat_lifecycle_test.rs`
        # backend-mismatch path); none of them require a GPU because
        # pre-flight fails before any subprocess spawns. The full
        # GPU-touching lifecycle lives on the nightly Metal lane plus
        # maintainer-run per-release UAT — never on PR CI.
        features: ["test-fixtures", "test-fixtures,uat"]
        # macOS sets `$TMPDIR` to /var/folders/<a>/<b>/T/ (~49 chars);
        # historical socket-path tests needed /tmp to stay under macOS's
        # sun_path limit. The HTTP-loopback transport removed that
        # constraint (Unit 4 of the Windows+HTTP-IPC plan) but pinning
        # /tmp is still cheap and avoids any other long-path surprise.
        # Windows uses the runner's default temp dir (no TMPDIR override).
        # `test_args` caps libtest's per-binary parallelism on the
        # slower / fewer-core macOS and Windows runners. Each daemon /
        # proxy integration test boots a full daemon (control plane +
        # proxy listener + supervised tasks); running several at once on
        # a 3-4 core runner oversubscribes the box and starves a listener
        # past its fixed readiness deadline — the flaky timeouts that
        # only surface off-Linux. ubuntu has the cores + fast threads to
        # run unconstrained.
        include:
          - os: ubuntu-latest
            tmpdir_override: /tmp
            test_args: ""
          - os: macos-latest
            tmpdir_override: /tmp
            test_args: "-- --test-threads=2"
          - os: windows-latest
            tmpdir_override: ""
            test_args: "-- --test-threads=2"
    runs-on: ${{ matrix.os }}
    needs: prepare
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --features ${{ matrix.features }} --workspace ${{ matrix.test_args }}
        env:
          RUST_BACKTRACE: 1
          TMPDIR: ${{ matrix.tmpdir_override }}

  test-no-features:
    # Validates that unit tests (--lib) pass without any feature flags.
    # Catches accidental dependencies on test-only surface — AGENTS.md
    # requires CI to run both with and without `test-fixtures`.
    name: test (no features)
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --lib
        run: cargo test --lib --no-fail-fast
        env:
          RUST_BACKTRACE: 1

  msrv:
    # Ensures the declared MSRV (Cargo.toml rust-version) stays honest.
    # Uses `cargo check --locked` so a dep bump past the declared MSRV
    # is caught here.
    name: msrv (1.95)
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95
      - uses: Swatinem/rust-cache@v2
      - name: cargo check --locked
        run: cargo check --locked

  audit:
    # Dependency vulnerability scan via `cargo audit`. Fails on any
    # advisory with a non-zero severity (--deny warnings).
    name: cargo audit
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: install cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit --deny warnings

  doc:
    # Ensures doc comments compile without warnings. Uses RUSTDOCFLAGS
    # so broken intra-doc links and invalid HTML tags fail the build.
    name: cargo doc
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo doc --no-deps
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  cross-aarch64:
    name: cross-compile aarch64-linux
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: install cross-linker
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: cargo check
        run: cargo check --target aarch64-unknown-linux-gnu --release
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

  nightly-coverage:
    # Keep one Ubuntu-only nightly lane for unstable-regression detection and
    # coverage publication; stable + macOS lanes above already cover the main
    # matrix, so we avoid doubling the expensive jobs.
    name: nightly coverage
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustc, rust-std, cargo, llvm-tools, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: clean stale stable artifacts
        run: cargo clean
      - name: create coverage directory
        run: mkdir -p ./target/debug/coverage
      - name: install grcov
        run: cargo install grcov --locked
      - name: cargo test nightly
        run: cargo test --features test-fixtures,uat --workspace --no-fail-fast
        env:
          CARGO_INCREMENTAL: "0"
          LLVM_PROFILE_FILE: "target/debug/coverage/llamastash-%p-%m.profraw"
          RUST_BACKTRACE: 1
          RUSTFLAGS: "-Cinstrument-coverage -Cpanic=abort -Zpanic_abort_tests"
          RUSTDOCFLAGS: "-C instrument-coverage -Cpanic=abort -Zpanic_abort_tests -Z unstable-options --persist-doctests target/debug/"
          TMPDIR: /tmp
      - name: bundle raw coverage profiles
        run: zip ./target/debug/coverage/files.zip ./target/debug/coverage/llamastash-*.profraw
      - name: grcov
        run: |
          grcov ./target/debug/coverage/files.zip \
            -s . \
            --binary-path ./target/debug/ \
            -o ./target/debug/coverage/lcov.info \
            --branch \
            --ignore-not-existing \
            --llvm \
            --filter covered \
            --ignore '/*' \
            --ignore 'C:/*' \
            --ignore '../*' \
            -t lcov
      - name: Push grcov results to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: ./target/debug/coverage/lcov.info
          format: lcov

  actionlint:
    # Static analysis for the workflow YAML themselves. Catches expression
    # mistakes, shell quoting bugs, deprecated keywords, and similar shape
    # issues that would otherwise only surface when a release.yml regression
    # detonates mid-tag.
    name: actionlint
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v6
      - name: install actionlint + shellcheck
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y shellcheck
          # Pin to a specific actionlint release for reproducibility.
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash \
            | bash -s -- 1.7.7
          ./actionlint -version
      - name: actionlint
        run: ./actionlint -color

  release-readiness:
    # Pre-tag guards that catch release-breaking PRs *before* a maintainer
    # cuts a tag. Each check is cheap and fast; running them on every PR
    # means the release workflow never fails for reasons a PR could have
    # surfaced.
    name: release readiness
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: prepare
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: cargo publish --dry-run
        # Validates Cargo.toml manifest shape, license, README presence, and
        # the published file set. Does NOT verify crate-name availability.
        run: cargo publish --dry-run --locked

      - name: changelog has unreleased heading
        # On PRs we just want SOMETHING under [Unreleased]; the tag-time
        # Cargo.toml ↔ CHANGELOG ↔ tag cross-check lives in release.yml's
        # `prepare-release` job, so duplicating it here only fires noise
        # on the release-prep PR (where the maintainer is already paying
        # attention) and on every commit between the Cargo.toml bump and
        # the tag. Keep this lightweight presence guard only.
        run: |
          set -euo pipefail
          if ! grep -q '^## \[Unreleased\]' CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing the [Unreleased] section header."
            exit 1
          fi
          echo "[Unreleased] heading present; OK"

      - name: packager.py unit tests
        # Catches template / argv regressions in the homebrew packager before
        # the release workflow tries to use it.
        run: python3 deployment/homebrew/packager_test.py

      - name: AUR packager.py unit tests
        # Same intent for the AUR packager (publish-aur-source / publish-aur-bin).
        run: python3 deployment/aur/packager_test.py

      - name: Scoop packager.py unit tests
        # Same intent for the Scoop bucket packager (publish-scoop).
        run: python3 deployment/scoop/packager_test.py

      - name: uat — R4 audit (release build never ships --features uat)
        # The shipped binary on crates.io / Homebrew must not carry the
        # maintainer-only `uat` Cargo feature. The release workflow may
        # legitimately use `--features uat` in pre-build validation jobs;
        # what must never happen is adding it to a `cargo build ... --bin
        # llamastash --locked` line that produces the shipped tarballs.
        run: |
          set -euo pipefail
          if grep -nE '^[^#]*cargo build .*--features[[:space:]]+uat.*--bin[[:space:]]+llamastash' .github/workflows/release.yml; then
            echo "::error::release.yml adds '--features uat' to a shipped cargo build line — that would ship the maintainer-only UAT subcommand to end users."
            exit 1
          fi
          echo "R4: shipped cargo build lines in release.yml do not pass --features uat; OK"

      - name: uat — synthetic exit codes documented
        # Agents parsing `failure_summary.exit_code` rely on the synthetic
        # code table in docs/testing/hardware-uat.md. Each crate-private
        # constant in src/cli/uat/lifecycle.rs must appear in the doc so
        # downstream tooling never sees an undocumented magic number.
        run: |
          set -euo pipefail
          doc=docs/testing/hardware-uat.md
          for sym in PREFLIGHT_MISMATCH_CODE SMOKE_HTTP_ERROR_CODE \
                     SMOKE_PARSE_ERROR_CODE SMOKE_STATUS_ERROR_CODE \
                     TIMEOUT_CODE SIGINT_CODE; do
            if ! grep -qF "$sym" "$doc"; then
              echo "::error::synthetic exit-code constant $sym is missing from $doc"
              exit 1
            fi
          done
          echo "all synthetic UAT exit-code constants are documented in $doc; OK"

      - name: uat — nightly workflow carries ce-review fix lock-ins
        # Three ce-review fixes that have textual signatures in the
        # nightly workflow. Reverting any of them silently would
        # re-introduce a flagged regression class — guard accordingly.
        #
        # M-P2-12: gh issue body via --body-file (shell-escape safe).
        # M-P3-05: gh issue list with --limit 1 + title filter.
        # M-P3-07: brew formula version folded into the cache key.
        # M-P2-07: HF cache path is the stable runner root, not the
        #          ephemeral sandbox HF_HOME under /tmp.
        run: |
          set -euo pipefail
          nightly=.github/workflows/uat-metal-nightly.yml
          if [ ! -f "$nightly" ]; then
            echo "::notice::$nightly absent — skipping UAT nightly shape audit (spike-fail collapse path)"
            exit 0
          fi
          fail=0
          if ! grep -qF -- "--body-file" "$nightly"; then
            echo "::error::$nightly: gh issue comment must use --body-file (ce-review M-P2-12)"
            fail=1
          fi
          if ! grep -qF -- "--limit 1" "$nightly"; then
            echo "::error::$nightly: gh issue list must use --limit 1 (ce-review M-P3-05)"
            fail=1
          fi
          if ! grep -qF "brew info" "$nightly"; then
            echo "::error::$nightly: brew formula version must be folded into the cache key (ce-review M-P3-07)"
            fail=1
          fi
          # The HF cache path on `actions/cache@v4` must NOT be the
          # default `~/.cache/huggingface/hub` — the UAT sandbox redirects
          # HF_HOME, so caching the default path is a permanent miss
          # (M-P2-07).
          if grep -qE 'path:.*~/\.cache/huggingface/hub' "$nightly"; then
            echo "::error::$nightly: cache must target the stable HF root (steps.hf-cache.outputs.dir), not ~/.cache/huggingface/hub (ce-review M-P2-07)"
            fail=1
          fi
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "uat-metal-nightly.yml carries every ce-review fix signature; OK"

  install-sh-lint:
    # POSIX-strict lint of scripts/install.sh. The script targets Bash 3.2+
    # (macOS default) but POSIX is a stricter superset, so -s sh catches
    # portability issues the Bash 3 runtime would silently tolerate.
    name: shellcheck install.sh
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v6
      - name: install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck -s sh
        run: shellcheck -s sh scripts/install.sh

  install-sh-test:
    # Run the bats integration tests on both Linux and macOS so each platform's
    # native install path (target detection + uname mapping + tarball fetch +
    # checksum verify + extract) gets real-world coverage, not just simulation.
    name: bats install.sh (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    needs: prepare
    steps:
      - uses: actions/checkout@v6
      - name: install bats (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: install bats (macos)
        if: runner.os == 'macOS'
        run: brew install bats-core
      - name: bats scripts/install.test.bats
        run: bats --tap scripts/install.test.bats
