name: publish-aur-manual

# Manual recovery + initial-test workflow for the publish-aur-* steps in
# release.yml. Use when:
#
#   - The release.yml AUR job(s) failed but cargo publish / homebrew already
#     succeeded — re-running release.yml would re-publish to crates.io, which
#     fails on the duplicate version. This workflow re-does ONLY the AUR push.
#   - Bootstrapping AUR publishing for the first time. Trigger this workflow
#     against an existing GH Release tag (e.g. v0.0.1) BEFORE adding the
#     AUR_SSH_KEY secret to the auto path -- if the manual run works end to
#     end, the integrated release.yml jobs will too.
#
# Inputs:
#   release-tag   — existing GH Release tag whose source + .tar.gz.sha256
#                   sidecars feed the PKGBUILDs (e.g. v0.0.1). Must already
#                   exist and must NOT be a prerelease (AUR pkgver disallows
#                   `-`; the packager.py would reject it anyway).
#   variant       — which AUR variant to publish. `all` fires all three jobs;
#                   the variant-specific values fire just one.
#   template-ref  — source ref used for the templates + packager.py.
#                   Defaults to "main" so a hotfix on main can drive a re-run
#                   WITHOUT having to move the release tag.

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Existing GH Release tag to publish (e.g. v0.0.1)"
        required: true
        type: string
      variant:
        description: "Which AUR variant to publish"
        required: true
        type: choice
        options:
          - all
          - llamastash
          - llamastash-bin
          - llamastash-git
        default: all
      template-ref:
        description: "Source ref for templates + packager.py (default: main)"
        required: false
        type: string
        default: main

permissions:
  contents: read

concurrency:
  # Per-tag + per-variant so two simultaneous runs against different variants
  # don't fight over the same AUR repo. `all` shares the lock with itself
  # because the three jobs inside don't touch each other's AUR remote.
  group: publish-aur-manual-${{ inputs.release-tag }}-${{ inputs.variant }}
  cancel-in-progress: false

jobs:
  validate:
    name: validate inputs
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: validate tag shape + release exists + not a prerelease
        id: tag
        env:
          RELEASE_TAG: ${{ inputs.release-tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          # Stable tags only: AUR pkgver disallows `-`, and the packager.py
          # VERSION_RE is X.Y.Z only.
          if ! printf '%s' "$RELEASE_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::invalid release-tag: $RELEASE_TAG (expected vX.Y.Z stable; prerelease tags are not publishable to AUR)"
            exit 1
          fi
          if ! gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::no GH Release exists for tag $RELEASE_TAG in ${{ github.repository }}"
            exit 1
          fi
          version="${RELEASE_TAG#v}"
          printf 'version=%s\n' "$version" >>"$GITHUB_OUTPUT"

  publish-aur-source:
    name: publish AUR (source)
    needs: [validate]
    if: inputs.variant == 'all' || inputs.variant == 'llamastash'
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.validate.outputs.version }}
      RELEASE_TAG: ${{ inputs.release-tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.template-ref }}

      - name: compute source-tarball SHA-256
        id: shasum
        env:
          TAG: ${{ env.RELEASE_TAG }}
        shell: bash
        run: |
          set -euo pipefail
          sha=$(curl -fsSL "https://github.com/llamastash/llamastash/archive/refs/tags/${TAG}.tar.gz" | sha256sum | awk '{print $1}')
          if ! printf '%s' "$sha" | grep -Eq '^[a-f0-9]{64}$'; then
            echo "::error::source tarball sha-256 did not match expected shape: $sha"
            exit 1
          fi
          printf 'sha=%s\n' "$sha" >>"$GITHUB_OUTPUT"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: packager_test.py
        run: python3 deployment/aur/packager_test.py

      - name: render PKGBUILD
        env:
          SHA_SOURCE: ${{ steps.shasum.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p stage
          python3 deployment/aur/packager.py llamastash \
            "$RELEASE_VERSION" \
            deployment/aur/llamastash/PKGBUILD.template \
            stage/PKGBUILD \
            "$SHA_SOURCE"

      - name: generate .SRCINFO + namcap (in archlinux container)
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD/stage:/w" -w /w archlinux:base-devel bash -c '
            set -euo pipefail
            pacman -Sy --noconfirm --needed --quiet namcap >/dev/null
            useradd -m b
            chown -R b /w
            su -c "cd /w && makepkg --printsrcinfo > .SRCINFO && namcap PKGBUILD || true" b
          '

      - name: install AUR SSH key + known_hosts
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${AUR_SSH_KEY:-}" ]; then
            echo "::error::AUR_SSH_KEY secret is unset; cannot push to AUR"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" >~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519,rsa,ecdsa aur.archlinux.org >~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      - name: clone + push aur-llamastash (retry on non-fast-forward)
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.email "release-bot@users.noreply.github.com"
          git config --global user.name  "llamastash-release-bot"
          git clone ssh://aur@aur.archlinux.org/llamastash.git aur-pkg
          cp stage/PKGBUILD stage/.SRCINFO aur-pkg/
          cd aur-pkg
          git add PKGBUILD .SRCINFO
          if git diff-index --quiet HEAD; then
            echo "aur-llamastash already up to date for ${RELEASE_TAG}; nothing to commit"
            exit 0
          fi
          git commit -m "chore(pkg): bump llamastash to ${RELEASE_TAG}"
          for attempt in 1 2 3; do
            if git push origin master; then
              exit 0
            fi
            echo "push attempt ${attempt} failed; pulling --rebase and retrying"
            git pull --rebase origin master
            sleep $((attempt * 5))
          done
          echo "::error::AUR push (llamastash) failed after 3 attempts; inspect manually"
          exit 1

  publish-aur-bin:
    name: publish AUR (bin)
    needs: [validate]
    if: inputs.variant == 'all' || inputs.variant == 'llamastash-bin'
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.validate.outputs.version }}
      RELEASE_TAG: ${{ inputs.release-tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.template-ref }}

      - name: download per-target .sha256 sidecars from the GH Release
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          # Build-job sha-* artifacts expire after 7 days. Recover the
          # canonical sha sidecars from the GH Release itself, which are
          # immutable for as long as the release exists.
          mkdir -p sha-stash
          for attempt in 1 2 3 4 5; do
            if gh release download "$RELEASE_TAG" \
                 --repo "${{ github.repository }}" \
                 --pattern '*-unknown-linux-gnu.tar.gz.sha256' \
                 --dir sha-stash \
                 --clobber; then
              break
            fi
            echo "download attempt ${attempt} failed; sleeping ${attempt}s"
            sleep "$attempt"
          done
          ls -la sha-stash

      - name: extract per-target sha256s
        id: shas
        shell: bash
        run: |
          set -euo pipefail
          extract() {
            local triple="$1"
            local f="sha-stash/llamastash-${RELEASE_VERSION}-${triple}.tar.gz.sha256"
            if [ ! -f "$f" ]; then
              echo "::error::missing sha256 sidecar for ${triple}: $f" >&2
              exit 1
            fi
            awk '{print $1; exit}' "$f"
          }
          {
            echo "sha_x86_64_linux_gnu=$(extract x86_64-unknown-linux-gnu)"
            echo "sha_aarch64_linux_gnu=$(extract aarch64-unknown-linux-gnu)"
          } >>"$GITHUB_OUTPUT"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: packager_test.py
        run: python3 deployment/aur/packager_test.py

      - name: render PKGBUILD
        env:
          SHA_X86_64: ${{ steps.shas.outputs.sha_x86_64_linux_gnu }}
          SHA_AARCH64: ${{ steps.shas.outputs.sha_aarch64_linux_gnu }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p stage
          python3 deployment/aur/packager.py llamastash-bin \
            "$RELEASE_VERSION" \
            deployment/aur/llamastash-bin/PKGBUILD.template \
            stage/PKGBUILD \
            "$SHA_X86_64" \
            "$SHA_AARCH64"

      - name: generate .SRCINFO + namcap (in archlinux container)
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD/stage:/w" -w /w archlinux:base-devel bash -c '
            set -euo pipefail
            pacman -Sy --noconfirm --needed --quiet namcap >/dev/null
            useradd -m b
            chown -R b /w
            su -c "cd /w && makepkg --printsrcinfo > .SRCINFO && namcap PKGBUILD || true" b
          '

      - name: install AUR SSH key + known_hosts
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${AUR_SSH_KEY:-}" ]; then
            echo "::error::AUR_SSH_KEY secret is unset; cannot push to AUR"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" >~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519,rsa,ecdsa aur.archlinux.org >~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      - name: clone + push aur-llamastash-bin (retry on non-fast-forward)
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.email "release-bot@users.noreply.github.com"
          git config --global user.name  "llamastash-release-bot"
          git clone ssh://aur@aur.archlinux.org/llamastash-bin.git aur-pkg
          cp stage/PKGBUILD stage/.SRCINFO aur-pkg/
          cd aur-pkg
          git add PKGBUILD .SRCINFO
          if git diff-index --quiet HEAD; then
            echo "aur-llamastash-bin already up to date for ${RELEASE_TAG}; nothing to commit"
            exit 0
          fi
          git commit -m "chore(pkg): bump llamastash-bin to ${RELEASE_TAG}"
          for attempt in 1 2 3; do
            if git push origin master; then
              exit 0
            fi
            echo "push attempt ${attempt} failed; pulling --rebase and retrying"
            git pull --rebase origin master
            sleep $((attempt * 5))
          done
          echo "::error::AUR push (llamastash-bin) failed after 3 attempts; inspect manually"
          exit 1

  publish-aur-git:
    name: publish AUR (git)
    needs: [validate]
    if: inputs.variant == 'all' || inputs.variant == 'llamastash-git'
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.release-tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.template-ref }}

      - name: stage PKGBUILD + generate .SRCINFO (in archlinux container)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p stage
          cp deployment/aur/llamastash-git/PKGBUILD stage/PKGBUILD
          docker run --rm -v "$PWD/stage:/w" -w /w archlinux:base-devel bash -c '
            set -euo pipefail
            pacman -Sy --noconfirm --needed --quiet namcap >/dev/null
            useradd -m b
            chown -R b /w
            su -c "cd /w && makepkg --printsrcinfo > .SRCINFO && namcap PKGBUILD || true" b
          '

      - name: install AUR SSH key + known_hosts
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${AUR_SSH_KEY:-}" ]; then
            echo "::error::AUR_SSH_KEY secret is unset; cannot push to AUR"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" >~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519,rsa,ecdsa aur.archlinux.org >~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      - name: clone + push aur-llamastash-git (no-op if unchanged)
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.email "release-bot@users.noreply.github.com"
          git config --global user.name  "llamastash-release-bot"
          git clone ssh://aur@aur.archlinux.org/llamastash-git.git aur-pkg
          cp stage/PKGBUILD stage/.SRCINFO aur-pkg/
          cd aur-pkg
          git add PKGBUILD .SRCINFO
          if git diff-index --quiet HEAD; then
            echo "aur-llamastash-git already up to date; nothing to commit"
            exit 0
          fi
          git commit -m "chore(pkg): refresh llamastash-git PKGBUILD"
          for attempt in 1 2 3; do
            if git push origin master; then
              exit 0
            fi
            echo "push attempt ${attempt} failed; pulling --rebase and retrying"
            git pull --rebase origin master
            sleep $((attempt * 5))
          done
          echo "::error::AUR push (llamastash-git) failed after 3 attempts; inspect manually"
          exit 1
