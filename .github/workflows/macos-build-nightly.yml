name: macos-build-nightly

# Tier 3 nightly macOS build lane. Activated 2026-05-20 after the
# falsifying spike (run 26181924383) detected `cpu_only` on a headless
# macos-14 runner despite `--backend apple_metal`, confirming Metal is
# not exposed to GH-hosted runners.
#
# Catches the install-path side of the regression class (brew on
# macos-14, cross-compile aarch64-apple-darwin) without claiming Metal
# coverage. Maintainer-local UAT (`llamastash uat --backend apple_metal`)
# remains the real Metal coverage. See R3 in
# docs/plans/2026-05-19-002-feat-uat-e2e-hardware-strategy-plan.md.

on:
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: read

concurrency:
  group: macos-build-nightly
  cancel-in-progress: true

jobs:
  build:
    name: macOS build verification
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: cargo build --release --target aarch64-apple-darwin
        run: cargo build --release --target aarch64-apple-darwin --bin llamastash

      - uses: actions/upload-artifact@v4
        with:
          name: llamastash-aarch64-apple-darwin-${{ github.run_id }}
          path: target/aarch64-apple-darwin/release/llamastash
          retention-days: 7
