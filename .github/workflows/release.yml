name: release

# Triggered by a vX.Y.Z tag push. Pipeline shape (kdash cd.yml lineage):
#
#   1. prepare-release      — extract version from tag and cross-check it
#                             against Cargo.toml + CHANGELOG.
#   2. release-gate         — run tests + cold CPU-only UAT on Linux and
#                             macOS runners before any GH Release is created.
#   3. create-release       — `gh release create` (idempotent). Releases are
#                             made exactly once so the build matrix never races
#                             to create them.
#   4. build                — matrix builds 10 non-Windows target tarballs; each
#                             job uploads
#                             its own tarball + .sha256 sidecar via `gh release
#                             upload`, which is purely additive (no create).
#   5. publish-shasums      — aggregates per-target .sha256 into a sorted
#                             SHA256SUMS, uploads SHA256SUMS + install.sh +
#                             install.sh.sha256 to the GH Release.
#   6. publish-homebrew     — runs deployment/homebrew/packager.py, clones the
#                             tap via GH_BUMP_TOKEN (GIT_ASKPASS — token never
#                             touches argv or URL strings), rewrites the
#                             formula, lints with `brew style`, commits with
#                             rebase-and-retry. Skipped on pre-release tags.
#   7. publish-site         — fetches install.sh + sidecar from the release,
#                             re-verifies SHA-256, prepends a provenance header,
#                             recomputes the sidecar over the headered file
#                             (so curl https://.../install.sh.sha256 matches
#                             curl https://.../install.sh), writes version.ts
#                             via a quoted heredoc, clones + pushes the site
#                             repo. Skipped on pre-release tags.
#   8. publish-cargo        — `cargo publish` with retries on transient
#                             crates.io failures, idempotent against re-runs.
#                             Skipped on pre-release tags.
#   9. publish-aur-source   — renders deployment/aur/llamastash/PKGBUILD.template
#                             via deployment/aur/packager.py, generates .SRCINFO
#                             inside an archlinux:base-devel docker container,
#                             then clones ssh://aur@aur.archlinux.org/llamastash.git
#                             via AUR_SSH_KEY and force-pushes. Skipped on
#                             pre-release tags (AUR pkgver disallows `-`).
#  10. publish-aur-bin      — same shape; reuses the per-target sha-* artifacts
#                             produced by `build` for x86_64/aarch64 -linux-gnu
#                             prebuilt tarballs.
#  11. publish-aur-git      — refreshes deployment/aur/llamastash-git/PKGBUILD on
#                             the AUR side. Static file (no template); the job
#                             is a no-op when the file is unchanged since the
#                             last AUR commit.
#
# Pre-release tags (vX.Y.Z-suffix) still exercise prepare-release +
# release-gate + create-release + build + publish-shasums so dry runs catch
# test/UAT regressions across the full non-Windows matrix, but never write to
# the tap, site, crates.io, or AUR. The downstream cleanup needed after an rc1
# dry run is therefore just `git push --delete origin <tag>` plus `gh release
# delete`.
#
# Steps 6-11 run in parallel; all gate on publish-shasums. cargo publish is
# parallel with tap/site/AUR by intent (per the kdash pattern); failure modes
# are catalogued in docs/plans/2026-05-19-003-feat-0.2.0-release-setup-plan.md
# §Risks & Dependencies.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build against (e.g. v0.0.1)"
        required: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

# One release run per tag; queued tags wait rather than racing.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: prepare-release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
      is_prerelease: ${{ steps.tag.outputs.is_prerelease }}
    steps:
      - name: resolve tag (env-only, no template interpolation into shell)
        id: tag
        # `inputs.tag` is interpolated via env, never directly into the shell,
        # so an arbitrary `workflow_dispatch` value cannot template-inject.
        env:
          INPUT_TAG: ${{ inputs.tag }}
          GITHUB_REF: ${{ github.ref }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG:-}" ]; then
            tag="$INPUT_TAG"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "::error::invalid tag: $tag (expected vX.Y.Z or vX.Y.Z-suffix)"
            exit 1
          fi
          version="${tag#v}"
          case "$version" in
            *-*) prerelease=true ;;
            *)   prerelease=false ;;
          esac
          {
            echo "tag=$tag"
            echo "version=$version"
            echo "is_prerelease=$prerelease"
          } >>"$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          # On push, github.ref is the tag and the default works. On
          # workflow_dispatch, github.ref is the branch the workflow was
          # dispatched from; switch to the tag so every downstream job sees
          # the same source the tag captures.
          ref: ${{ steps.tag.outputs.tag }}

      - name: cross-check Cargo.toml, tag, CHANGELOG agree
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          RELEASE_VERSION: ${{ steps.tag.outputs.version }}
          IS_PRERELEASE: ${{ steps.tag.outputs.is_prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          cargo_version=$(awk -F\" '/^version[[:space:]]*=/ {print $2; exit}' Cargo.toml)
          if [ "$IS_PRERELEASE" = "true" ]; then
            cargo_core=${cargo_version%%-*}
            tag_core=${RELEASE_VERSION%%-*}
            if [ "$cargo_core" != "$tag_core" ]; then
              echo "::error::Cargo.toml release version ($cargo_core) does not match prerelease tag base ($tag_core)."
              echo "::error::Bump Cargo.toml or cut the prerelease tag from the matching release version."
              exit 1
            fi
          else
            if [ "$cargo_version" != "$RELEASE_VERSION" ]; then
              echo "::error::Cargo.toml version ($cargo_version) does not match tag ($RELEASE_VERSION)."
              echo "::error::Bump Cargo.toml before tagging."
              exit 1
            fi
          fi
          # Pre-release tags can ship before the CHANGELOG section exists.
          # Stable tags must already have a CHANGELOG heading.
          if [ "$IS_PRERELEASE" = "false" ]; then
            if ! grep -Eq "^## \[${RELEASE_VERSION}\]" CHANGELOG.md; then
              echo "::error::CHANGELOG.md is missing a [${RELEASE_VERSION}] section heading."
              exit 1
            fi
          fi

  release-gate:
    name: release-gate (${{ matrix.label }})
    needs: [prepare-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-cpu-only
            os: ubuntu-latest
          - label: macos-cpu-only
            os: macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test --features test-fixtures,uat
        run: cargo test --features test-fixtures,uat --workspace --no-fail-fast
        env:
          RUST_BACKTRACE: 1
          TMPDIR: /tmp

      - name: cold CPU-only UAT
        run: cargo run --features uat -- uat --host-backend cpu_only --mode cold --report-out uat-${{ matrix.label }}.json
        env:
          RUST_BACKTRACE: 1
          TMPDIR: /tmp

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: uat-${{ matrix.label }}-${{ github.run_id }}
          path: uat-${{ matrix.label }}.json
          retention-days: 7

  create-release:
    name: create-release
    needs: [prepare-release, release-gate]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ needs.prepare-release.outputs.tag }}
      version: ${{ needs.prepare-release.outputs.version }}
      is_prerelease: ${{ needs.prepare-release.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: create release (idempotent)
        env:
          RELEASE_TAG: ${{ needs.prepare-release.outputs.tag }}
          IS_PRERELEASE: ${{ needs.prepare-release.outputs.is_prerelease }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          # `gh release view` returns 0 if the release already exists for this
          # tag; in that case the build matrix is re-running and we should not
          # re-create. Otherwise create with auto-generated notes.
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "release ${RELEASE_TAG} already exists; matrix uploads will append"
            exit 0
          fi
          flags=(--title "$RELEASE_TAG" --generate-notes)
          if [ "$IS_PRERELEASE" = "true" ]; then
            flags+=(--prerelease)
          else
            flags+=(--latest)
          fi
          gh release create "$RELEASE_TAG" "${flags[@]}"

  build:
    name: build ${{ matrix.target }}
    needs: [create-release]
    env:
      RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
      RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
            verify_regex: 'ELF .*x86-64'
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            verify_regex: 'ELF .*x86-64'
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            verify_regex: 'ELF .*(aarch64|ARM aarch64)'
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            verify_regex: 'ELF .*(aarch64|ARM aarch64)'
          - target: arm-unknown-linux-gnueabi
            os: ubuntu-latest
            use_cross: true
            verify_regex: 'ELF .*ARM'
          - target: arm-unknown-linux-musleabihf
            os: ubuntu-latest
            use_cross: true
            verify_regex: 'ELF .*ARM'
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            use_cross: true
            verify_regex: 'ELF .*ARM'
          - target: armv7-unknown-linux-musleabihf
            os: ubuntu-latest
            use_cross: true
            verify_regex: 'ELF .*ARM'
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
            verify_regex: 'Mach-O .*(arm64|aarch64)'
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
            verify_regex: 'Mach-O .*x86_64'
          # Windows x86_64 ships as .zip (ecosystem convention) and uses
          # MSVC as the native toolchain. aarch64-pc-windows-msvc is
          # explicitly out of 0.0.2 scope per the plan's Scope
          # Boundaries; no `use_cross` row needed.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
            verify_regex: 'PE32\+ executable .*x86-64'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.create-release.outputs.tag }}

      # SHA-pinned per the project's release-secrets review: actions that
      # execute alongside CRATES_IO_TOKEN / GH_BUMP_TOKEN must not be
      # tag-pinned, since a compromised tag would get those secrets. Bumps
      # land via the Dependabot config in .github/dependabot.yml.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable, 2026-05
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - uses: taiki-e/install-action@efefed674a25e760aca7952da429419e28e6c0a7  # cross
        if: matrix.use_cross
      - uses: taiki-e/setup-cross-toolchain-action@3d9770ce98eb7dbcf378563182a5e8031165f75b  # v1
        if: matrix.use_cross
        with:
          target: ${{ matrix.target }}

      - name: cargo build --release --locked
        # The shipped binary must NEVER include `--features uat` — the
        # maintainer-only UAT subcommand is gated behind that feature so
        # it never reaches crates.io / Homebrew users. Audit per the
        # plan §R10: `grep -F "features uat" .github/workflows/release.yml`
        # should return only this comment line.
        #
        # `setup-cross-toolchain-action` exports CARGO_TARGET_<TARGET>_LINKER
        # and the matching CC_/AR_ env vars for every cross target (including
        # musl) so plain `cargo build` picks up the right linker. Invoking
        # `cross build` instead triggered cross-rs's "fall back to cargo on
        # the host" path because those same env vars made cross think the
        # host could build natively — and the host has no musl linker, so
        # the four musl matrix entries failed with `linker
        # `<target>-musl-gcc` not found`. Match the kdash pattern: always
        # `cargo build`.
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --target "${{ matrix.target }}" --bin llamastash --locked

      - name: verify binary is an executable for the target arch
        # `file` ships with Git for Windows on windows-latest runners, so
        # the bash shell setting plus bundled `file` keeps the check
        # uniform across all platforms.
        shell: bash
        run: |
          set -euo pipefail
          # Windows binaries have the `.exe` suffix; everything else doesn't.
          bin="target/${{ matrix.target }}/release/llamastash"
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            bin="${bin}.exe"
          fi
          out=$(file "$bin")
          echo "$out"
          echo "$out" | grep -Eq "${{ matrix.verify_regex }}" || { echo "::error::wrong arch"; exit 1; }

      - name: package archive
        # Windows ships .zip (ecosystem convention; install.ps1 expects
        # it). Linux/macOS keep .tar.gz. shasum on Windows is provided
        # by Git for Windows' Perl shim; `tar` is available too but
        # we use PowerShell's `Compress-Archive` semantics via bash's
        # `zip` (preinstalled on windows-latest as part of the MSYS
        # toolchain).
        shell: bash
        run: |
          set -euo pipefail
          stage="llamastash-${RELEASE_VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${stage}"
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            cp "target/${{ matrix.target }}/release/llamastash.exe" "dist/${stage}/"
          else
            cp "target/${{ matrix.target }}/release/llamastash" "dist/${stage}/"
          fi
          cp LICENSE README.md CHANGELOG.md "dist/${stage}/"
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            (cd dist && 7z a -tzip "${stage}.zip" "${stage}" \
              && shasum -a 256 "${stage}.zip" >"${stage}.zip.sha256")
          else
            (cd dist && tar -czf "${stage}.tar.gz" "${stage}" \
              && shasum -a 256 "${stage}.tar.gz" >"${stage}.tar.gz.sha256")
          fi
          ls -la dist

      - name: upload assets to the existing release
        # `gh release upload` is purely additive — no create. The release is
        # already there from create-release, so the four matrix jobs cannot
        # race to create it. `--clobber` lets a workflow re-run overwrite.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          stage="llamastash-${RELEASE_VERSION}-${{ matrix.target }}"
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            gh release upload "$RELEASE_TAG" --clobber \
              "dist/${stage}.zip" "dist/${stage}.zip.sha256"
          else
            gh release upload "$RELEASE_TAG" --clobber \
              "dist/${stage}.tar.gz" "dist/${stage}.tar.gz.sha256"
          fi

      - name: stash sha sidecar for downstream jobs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p sha-stash
          stage="llamastash-${RELEASE_VERSION}-${{ matrix.target }}"
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            cp "dist/${stage}.zip.sha256" sha-stash/
          else
            cp "dist/${stage}.tar.gz.sha256" sha-stash/
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: sha-${{ matrix.target }}
          path: sha-stash

  publish-shasums:
    name: publish SHA256SUMS + install scripts
    needs: [create-release, build]
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
      RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.create-release.outputs.tag }}
          sparse-checkout: |
            scripts/install.sh
            scripts/install.ps1
          sparse-checkout-cone-mode: false
      - uses: actions/download-artifact@v8
        with:
          pattern: sha-*
          merge-multiple: true
          path: sha-stash

      - name: build aggregate SHA256SUMS + installer sidecars
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          # Concatenate per-target .sha256 sidecars into a single SHA256SUMS,
          # sorted for deterministic line order across runs. Includes both
          # .tar.gz (Linux/macOS) and .zip (Windows) sidecars.
          cat sha-stash/*.sha256 | LC_ALL=C sort >dist/SHA256SUMS
          # Verify shape: hex(64) + whitespace + filename.
          awk '
            NF < 2 || $1 !~ /^[a-fA-F0-9]{64}$/ {
              printf "::error::bad SHA256SUMS line: %s\n", $0 > "/dev/stderr"
              exit 1
            }
          ' dist/SHA256SUMS
          line_count=$(wc -l <dist/SHA256SUMS)
          if [ "$line_count" -ne 11 ]; then
            echo "::error::SHA256SUMS has $line_count lines; expected 11 (one per target)"
            cat dist/SHA256SUMS
            exit 1
          fi

          cp scripts/install.sh dist/install.sh
          chmod +x dist/install.sh
          (cd dist && shasum -a 256 install.sh >install.sh.sha256)
          cp scripts/install.ps1 dist/install.ps1
          (cd dist && shasum -a 256 install.ps1 >install.ps1.sha256)
          ls -la dist

      - name: upload SHA256SUMS + installers + sidecars
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" --clobber \
            dist/SHA256SUMS \
            dist/install.sh \
            dist/install.sh.sha256 \
            dist/install.ps1 \
            dist/install.ps1.sha256

  publish-homebrew:
    name: publish homebrew formula
    needs: [create-release, publish-shasums]
    runs-on: ubuntu-latest
    # Pre-release tags exercise the upstream chain (build + shasums) but never
    # touch external repos. Cleanup after a dry-run is `gh release delete`.
    if: needs.create-release.outputs.is_prerelease == 'false'
    env:
      RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
      RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.create-release.outputs.tag }}
      - uses: actions/download-artifact@v8
        with:
          pattern: sha-*
          merge-multiple: true
          path: sha-stash

      - name: extract per-target sha256s
        id: shas
        shell: bash
        run: |
          set -euo pipefail
          extract() {
            local triple="$1"
            local f="sha-stash/llamastash-${RELEASE_VERSION}-${triple}.tar.gz.sha256"
            if [ ! -f "$f" ]; then
              echo "::error::missing sha256 sidecar for ${triple}: $f" >&2
              exit 1
            fi
            awk '{print $1; exit}' "$f"
          }
          {
            echo "sha_aarch64_darwin=$(extract aarch64-apple-darwin)"
            echo "sha_x86_64_darwin=$(extract x86_64-apple-darwin)"
            echo "sha_aarch64_linux=$(extract aarch64-unknown-linux-gnu)"
            echo "sha_x86_64_linux=$(extract x86_64-unknown-linux-gnu)"
          } >>"$GITHUB_OUTPUT"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: render + validate formula
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          SHA_AARCH64_DARWIN: ${{ steps.shas.outputs.sha_aarch64_darwin }}
          SHA_X86_64_DARWIN:  ${{ steps.shas.outputs.sha_x86_64_darwin }}
          SHA_AARCH64_LINUX:  ${{ steps.shas.outputs.sha_aarch64_linux }}
          SHA_X86_64_LINUX:   ${{ steps.shas.outputs.sha_x86_64_linux }}
        run: |
          set -euo pipefail
          python3 deployment/homebrew/packager.py \
            "$RELEASE_VERSION" \
            deployment/homebrew/llamastash.rb.template \
            llamastash.rb \
            "$SHA_AARCH64_DARWIN" \
            "$SHA_X86_64_DARWIN" \
            "$SHA_AARCH64_LINUX" \
            "$SHA_X86_64_LINUX"

      - name: brew style (catches template regressions before push)
        run: |
          set -euo pipefail
          # Linuxbrew installs to /home/linuxbrew/.linuxbrew/bin which is not
          # on $PATH by default on the runner.
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" </dev/null
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew style llamastash.rb

      - name: clone + push tap (token via GIT_ASKPASS, retry on non-fast-forward)
        env:
          GH_BUMP_TOKEN: ${{ secrets.GH_BUMP_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          if [ -z "${GH_BUMP_TOKEN:-}" ]; then
            echo "::error::GH_BUMP_TOKEN secret is unset; cannot push to tap repo"
            exit 1
          fi

          # GIT_ASKPASS keeps the token out of process argv and any URL log.
          askpass_dir=$(mktemp -d)
          cat >"$askpass_dir/askpass.sh" <<'ASKPASS'
          #!/bin/sh
          printf '%s\n' "$GH_BUMP_TOKEN"
          ASKPASS
          chmod +x "$askpass_dir/askpass.sh"
          export GIT_ASKPASS="$askpass_dir/askpass.sh"

          git config --global user.email "release-bot@users.noreply.github.com"
          git config --global user.name  "llamastash-release-bot"
          git config --global credential.helper ""

          git clone "https://x-access-token@github.com/llamastash/homebrew-llamastash.git" --branch main brew
          cp llamastash.rb brew/Formula/llamastash.rb
          cd brew
          git add Formula/llamastash.rb
          if git diff-index --quiet HEAD; then
            echo "tap already up to date for ${RELEASE_TAG}; nothing to commit"
            exit 0
          fi
          git commit -m "chore(formula): bump llamastash to ${RELEASE_TAG}"

          # Retry push with pull --rebase on non-fast-forward (concurrent
          # human edit to the tap repo's main during the release window).
          for attempt in 1 2 3; do
            if git push origin main; then
              exit 0
            fi
            echo "push attempt ${attempt} failed; pulling --rebase and retrying"
            git pull --rebase origin main
            sleep $((attempt * 5))
          done
          echo "::error::tap push failed after 3 attempts; inspect manually"
          exit 1

  publish-scoop:
    name: publish scoop manifest
    needs: [create-release, publish-shasums]
    runs-on: ubuntu-latest
    # Pre-release tags don't touch the bucket repo; mirror publish-homebrew.
    if: needs.create-release.outputs.is_prerelease == 'false'
    env:
      RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
      RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.create-release.outputs.tag }}
      - uses: actions/download-artifact@v8
        with:
          pattern: sha-*
          merge-multiple: true
          path: sha-stash

      - name: extract Windows sha256
        id: shas
        shell: bash
        run: |
          set -euo pipefail
          f="sha-stash/llamastash-${RELEASE_VERSION}-x86_64-pc-windows-msvc.zip.sha256"
          if [ ! -f "$f" ]; then
            echo "::error::missing sha256 sidecar for Windows zip: $f" >&2
            exit 1
          fi
          sha=$(awk '{print $1; exit}' "$f")
          echo "sha_x86_64_windows=${sha}" >>"$GITHUB_OUTPUT"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: render scoop manifest
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          SHA_X86_64_WINDOWS: ${{ steps.shas.outputs.sha_x86_64_windows }}
        run: |
          set -euo pipefail
          python3 deployment/scoop/packager.py \
            "$RELEASE_VERSION" \
            deployment/scoop/llamastash.json.template \
            llamastash.json \
            "$SHA_X86_64_WINDOWS"

      - name: jq validate manifest is well-formed JSON
        # Cheap safety net so a template typo that breaks JSON shape doesn't
        # ship a broken manifest to the bucket.
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y jq
          jq -e . llamastash.json >/dev/null

      - name: clone + push bucket (token via GIT_ASKPASS, retry on non-fast-forward)
        env:
          GH_BUMP_TOKEN: ${{ secrets.GH_BUMP_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          if [ -z "${GH_BUMP_TOKEN:-}" ]; then
            echo "::error::GH_BUMP_TOKEN secret is unset; cannot push to scoop bucket"
            exit 1
          fi

          askpass_dir=$(mktemp -d)
          cat >"$askpass_dir/askpass.sh" <<'ASKPASS'
          #!/bin/sh
          printf '%s\n' "$GH_BUMP_TOKEN"
          ASKPASS
          chmod +x "$askpass_dir/askpass.sh"
          export GIT_ASKPASS="$askpass_dir/askpass.sh"

          git config --global user.email "release-bot@users.noreply.github.com"
          git config --global user.name  "llamastash-release-bot"
          git config --global credential.helper ""

          git clone "https://x-access-token@github.com/llamastash/scoop-llamastash.git" --branch main scoop
          cp llamastash.json scoop/llamastash.json
          cd scoop
          git add llamastash.json
          if git diff-index --quiet HEAD; then
            echo "bucket already up to date for ${RELEASE_TAG}; nothing to commit"
            exit 0
          fi
          git commit -m "chore(manifest): bump llamastash to ${RELEASE_TAG}"

          for attempt in 1 2 3; do
            if git push origin main; then
              exit 0
            fi
            echo "push attempt ${attempt} failed; pulling --rebase and retrying"
            git pull --rebase origin main
            sleep $((attempt * 5))
          done
          echo "::error::bucket push failed after 3 attempts; inspect manually"
          exit 1

  publish-site:
    name: publish site install.sh mirror
    needs: [create-release, publish-shasums]
    runs-on: ubuntu-latest
    if: needs.create-release.outputs.is_prerelease == 'false'
    env:
      RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
      RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.create-release.outputs.tag }}

      - name: download install.sh + sidecar from the release (with retry)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p stage
          # GH Releases asset propagation can lag a few seconds behind the
          # publish-shasums upload. Retry briefly before failing.
          for attempt in 1 2 3 4 5; do
            if gh release download "$RELEASE_TAG" \
                 --repo "${{ github.repository }}" \
                 --pattern install.sh \
                 --pattern install.sh.sha256 \
                 --dir stage \
                 --clobber; then
              break
            fi
            echo "download attempt ${attempt} failed; sleeping ${attempt}s"
            sleep "$attempt"
          done
          (cd stage && sha256sum -c install.sh.sha256)

      - name: clone + push site (token via GIT_ASKPASS, retry on non-fast-forward)
        env:
          GH_BUMP_TOKEN: ${{ secrets.GH_BUMP_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          set -euo pipefail
          if [ -z "${GH_BUMP_TOKEN:-}" ]; then
            echo "::error::GH_BUMP_TOKEN secret is unset; cannot push to site repo"
            exit 1
          fi

          askpass_dir=$(mktemp -d)
          cat >"$askpass_dir/askpass.sh" <<'ASKPASS'
          #!/bin/sh
          printf '%s\n' "$GH_BUMP_TOKEN"
          ASKPASS
          chmod +x "$askpass_dir/askpass.sh"
          export GIT_ASKPASS="$askpass_dir/askpass.sh"

          released_at=$(date -u +%Y-%m-%d)
          git config --global user.email "release-bot@users.noreply.github.com"
          git config --global user.name  "llamastash-release-bot"
          git config --global credential.helper ""

          git clone "https://x-access-token@github.com/llamastash/llamastash.github.io.git" --branch main site

          # Prepend a provenance header to install.sh, then RECOMPUTE the
          # sidecar so `curl .../install.sh.sha256 | sha256sum -c` against the
          # served file matches. The previous version copied the original
          # sidecar, which was computed before the header — a real verification
          # break for users.
          {
            printf '# Source: github.com/llamastash/llamastash@%s/scripts/install.sh\n' "$RELEASE_TAG"
            printf '# SHA-256 verified by .github/workflows/release.yml on %s.\n' "$released_at"
            cat stage/install.sh
          } >site/public/install.sh
          chmod +x site/public/install.sh
          (cd site/public && shasum -a 256 install.sh >install.sh.sha256)

          # Generate version.ts via a quoted heredoc + sed substitution so
          # tag/version values cannot expand inside the heredoc. The upstream
          # tag regex blocks `"` today but the indirection makes the file safe
          # against any future regex relaxation as well.
          cat >site/src/data/version.ts <<'TS_EOF'
          // Bumped on every release by .github/workflows/release.yml in the main
          // repo. Do not edit by hand.

          export const VERSION = "__VERSION__";
          export const TAG = "__TAG__";
          export const RELEASED_AT = "__RELEASED_AT__";
          TS_EOF
          # sed substitutes the placeholders with the validated values. The
          # values went through the tag regex in create-release; the dates
          # are date-formatted by `date -u`. Both are safe to inline.
          sed -i \
            -e "s|__VERSION__|${RELEASE_VERSION}|g" \
            -e "s|__TAG__|${RELEASE_TAG}|g" \
            -e "s|__RELEASED_AT__|${released_at}|g" \
            site/src/data/version.ts

          cd site
          git add public/install.sh public/install.sh.sha256 src/data/version.ts
          if git diff-index --quiet HEAD; then
            echo "site already up to date for ${RELEASE_TAG}; nothing to commit"
            exit 0
          fi
          git commit -m "chore(release): mirror install.sh for ${RELEASE_TAG}"

          for attempt in 1 2 3; do
            if git push origin main; then
              exit 0
            fi
            echo "push attempt ${attempt} failed; pulling --rebase and retrying"
            git pull --rebase origin main
            sleep $((attempt * 5))
          done
          echo "::error::site push failed after 3 attempts; inspect manually"
          exit 1

  publish-cargo:
    name: publish to crates.io
    needs: [create-release, publish-shasums]
    runs-on: ubuntu-latest
    if: needs.create-release.outputs.is_prerelease == 'false'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.create-release.outputs.tag }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable, 2026-05
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: cargo publish (retry on transient crates.io errors, idempotent on already-published)
        env:
          # Pass via env, never via --token argv, so the token never appears
          # in the process table or any future `set -x` log.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::error::CRATES_IO_TOKEN secret is unset"
            exit 1
          fi
          # Write the stderr sidecar OUTSIDE the checkout — cargo publish's
          # dirty-tree check would otherwise reject the run with
          # "1 files in the working directory contain changes ... publish.err".
          err_log="${RUNNER_TEMP:-/tmp}/cargo-publish.err"
          for attempt in 1 2 3; do
            if cargo publish --locked 2> "$err_log"; then
              echo "cargo publish succeeded on attempt ${attempt}"
              exit 0
            fi
            cat "$err_log" >&2
            # Treat "already uploaded" / "already exists" as success — happens
            # on a re-run after a workflow-level retry.
            if grep -qiE 'already uploaded|already exists' "$err_log"; then
              echo "crates.io reports this version is already published; treating as success"
              exit 0
            fi
            echo "cargo publish attempt ${attempt} failed; sleeping $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "::error::cargo publish failed 3 times; investigate crates.io status"
          exit 1

  publish-aur-source:
    name: publish AUR (source)
    needs: [create-release, publish-shasums]
    runs-on: ubuntu-latest
    # AUR pkgver disallows `-`; prerelease tags would render an invalid PKGBUILD.
    # The packager.py VERSION_RE rejects them too, but skipping here keeps the
    # rc1 dry-run from spuriously failing on an unrelated guard.
    if: needs.create-release.outputs.is_prerelease == 'false'
    env:
      RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
      RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.create-release.outputs.tag }}

      - name: compute source-tarball SHA-256
        id: shasum
        env:
          TAG: ${{ env.RELEASE_TAG }}
        shell: bash
        run: |
          set -euo pipefail
          # GitHub's auto-generated source tarball isn't in our sha-* artifacts
          # (those cover the prebuilt binary tarballs). Stream + hash inline.
          sha=$(curl -fsSL "https://github.com/llamastash/llamastash/archive/refs/tags/${TAG}.tar.gz" | sha256sum | awk '{print $1}')
          if ! printf '%s' "$sha" | grep -Eq '^[a-f0-9]{64}$'; then
            echo "::error::source tarball sha-256 did not match expected shape: $sha"
            exit 1
          fi
          printf 'sha=%s\n' "$sha" >>"$GITHUB_OUTPUT"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: packager_test.py (template/argv regressions catch before render)
        run: python3 deployment/aur/packager_test.py

      - name: render PKGBUILD
        env:
          SHA_SOURCE: ${{ steps.shasum.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p stage
          python3 deployment/aur/packager.py llamastash \
            "$RELEASE_VERSION" \
            deployment/aur/llamastash/PKGBUILD.template \
            stage/PKGBUILD \
            "$SHA_SOURCE"

      - name: generate .SRCINFO + namcap (in archlinux container)
        shell: bash
        run: |
          set -euo pipefail
          # makepkg refuses to run as root; the entrypoint provisions a build
          # user and chowns the bind-mount so namcap/makepkg can write .SRCINFO.
          # namcap surfaces stylistic warnings; treat as advisory (|| true).
          docker run --rm -v "$PWD/stage:/w" -w /w archlinux:base-devel bash -c '
            set -euo pipefail
            pacman -Sy --noconfirm --needed --quiet namcap >/dev/null
            useradd -m b
            chown -R b /w
            su -c "cd /w && makepkg --printsrcinfo > .SRCINFO && namcap PKGBUILD || true" b
          '

      - name: install AUR SSH key + known_hosts
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${AUR_SSH_KEY:-}" ]; then
            echo "::error::AUR_SSH_KEY secret is unset; cannot push to AUR"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" >~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Future hardening: pin the AUR host-key fingerprint here. The Arch
          # wiki publishes current fingerprints under "AUR submission guidelines".
          ssh-keyscan -t ed25519,rsa,ecdsa aur.archlinux.org >~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      - name: clone + push aur-llamastash (retry on non-fast-forward)
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.email "release-bot@users.noreply.github.com"
          git config --global user.name  "llamastash-release-bot"
          git clone ssh://aur@aur.archlinux.org/llamastash.git aur-pkg
          cp stage/PKGBUILD stage/.SRCINFO aur-pkg/
          cd aur-pkg
          git add PKGBUILD .SRCINFO
          if git diff-index --quiet HEAD; then
            echo "aur-llamastash already up to date for ${RELEASE_TAG}; nothing to commit"
            exit 0
          fi
          git commit -m "chore(pkg): bump llamastash to ${RELEASE_TAG}"
          for attempt in 1 2 3; do
            if git push origin master; then
              exit 0
            fi
            echo "push attempt ${attempt} failed; pulling --rebase and retrying"
            git pull --rebase origin master
            sleep $((attempt * 5))
          done
          echo "::error::AUR push (llamastash) failed after 3 attempts; inspect manually"
          exit 1

  publish-aur-bin:
    name: publish AUR (bin)
    needs: [create-release, publish-shasums]
    runs-on: ubuntu-latest
    if: needs.create-release.outputs.is_prerelease == 'false'
    env:
      RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
      RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.create-release.outputs.tag }}
      - uses: actions/download-artifact@v8
        with:
          pattern: sha-*
          merge-multiple: true
          path: sha-stash

      - name: extract per-target sha256s
        id: shas
        shell: bash
        run: |
          set -euo pipefail
          extract() {
            local triple="$1"
            local f="sha-stash/llamastash-${RELEASE_VERSION}-${triple}.tar.gz.sha256"
            if [ ! -f "$f" ]; then
              echo "::error::missing sha256 sidecar for ${triple}: $f" >&2
              exit 1
            fi
            awk '{print $1; exit}' "$f"
          }
          {
            echo "sha_x86_64_linux_gnu=$(extract x86_64-unknown-linux-gnu)"
            echo "sha_aarch64_linux_gnu=$(extract aarch64-unknown-linux-gnu)"
          } >>"$GITHUB_OUTPUT"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: render PKGBUILD
        env:
          SHA_X86_64: ${{ steps.shas.outputs.sha_x86_64_linux_gnu }}
          SHA_AARCH64: ${{ steps.shas.outputs.sha_aarch64_linux_gnu }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p stage
          python3 deployment/aur/packager.py llamastash-bin \
            "$RELEASE_VERSION" \
            deployment/aur/llamastash-bin/PKGBUILD.template \
            stage/PKGBUILD \
            "$SHA_X86_64" \
            "$SHA_AARCH64"

      - name: generate .SRCINFO + namcap (in archlinux container)
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD/stage:/w" -w /w archlinux:base-devel bash -c '
            set -euo pipefail
            pacman -Sy --noconfirm --needed --quiet namcap >/dev/null
            useradd -m b
            chown -R b /w
            su -c "cd /w && makepkg --printsrcinfo > .SRCINFO && namcap PKGBUILD || true" b
          '

      - name: install AUR SSH key + known_hosts
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${AUR_SSH_KEY:-}" ]; then
            echo "::error::AUR_SSH_KEY secret is unset; cannot push to AUR"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" >~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519,rsa,ecdsa aur.archlinux.org >~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      - name: clone + push aur-llamastash-bin (retry on non-fast-forward)
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        shell: bash
        run: |
          set -euo pipefail
          git config --global user.email "release-bot@users.noreply.github.com"
          git config --global user.name  "llamastash-release-bot"
          git clone ssh://aur@aur.archlinux.org/llamastash-bin.git aur-pkg
          cp stage/PKGBUILD stage/.SRCINFO aur-pkg/
          cd aur-pkg
          git add PKGBUILD .SRCINFO
          if git diff-index --quiet HEAD; then
            echo "aur-llamastash-bin already up to date for ${RELEASE_TAG}; nothing to commit"
            exit 0
          fi
          git commit -m "chore(pkg): bump llamastash-bin to ${RELEASE_TAG}"
          for attempt in 1 2 3; do
            if git push origin master; then
              exit 0
            fi
            echo "push attempt ${attempt} failed; pulling --rebase and retrying"
            git pull --rebase origin master
            sleep $((attempt * 5))
          done
          echo "::error::AUR push (llamastash-bin) failed after 3 attempts; inspect manually"
          exit 1

  publish-aur-git:
    name: publish AUR (git)
    needs: [create-release, publish-shasums]
    runs-on: ubuntu-latest
    if: needs.create-release.outputs.is_prerelease == 'false'
    env:
      RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
