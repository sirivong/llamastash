name: release

# Triggered by a vX.Y.Z tag push. Pipeline shape (kdash cd.yml lineage):
#
#   1. create-release       — extract version from tag, cross-check it against
#                             Cargo.toml + CHANGELOG, then `gh release create`
#                             (idempotent). Releases are made exactly once so
#                             the build matrix never races to create them.
#   2. build                — matrix builds 4 target tarballs; each job uploads
#                             its own tarball + .sha256 sidecar via `gh release
#                             upload`, which is purely additive (no create).
#   3. publish-shasums      — aggregates per-target .sha256 into a sorted
#                             SHA256SUMS, uploads SHA256SUMS + install.sh +
#                             install.sh.sha256 to the GH Release.
#   4. publish-homebrew     — runs deployment/homebrew/packager.py, clones the
#                             tap via GH_BUMP_TOKEN (GIT_ASKPASS — token never
#                             touches argv or URL strings), rewrites the
#                             formula, lints with `brew style`, commits with
#                             rebase-and-retry. Skipped on pre-release tags.
#   5. publish-site         — fetches install.sh + sidecar from the release,
#                             re-verifies SHA-256, prepends a provenance header,
#                             recomputes the sidecar over the headered file
#                             (so curl https://.../install.sh.sha256 matches
#                             curl https://.../install.sh), writes version.ts
#                             via a quoted heredoc, clones + pushes the site
#                             repo. Skipped on pre-release tags.
#   6. publish-cargo        — `cargo publish` with retries on transient
#                             crates.io failures, idempotent against re-runs.
#                             Skipped on pre-release tags.
#
# Pre-release tags (vX.Y.Z-suffix) exercise only create-release + build +
# publish-shasums so feature-branch dry runs never write to the tap, site,
# or crates.io. The downstream cleanup needed after an rc1 dry run is
# therefore just `git push --delete origin <tag>` plus `gh release delete`.
#
# Steps 4-6 run in parallel; all gate on publish-shasums. cargo publish is
# parallel with tap/site by intent (per the kdash pattern); failure modes
# are catalogued in docs/plans/2026-05-19-003-feat-0.2.0-release-setup-plan.md
# §Risks & Dependencies.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build against (e.g. v0.0.1)"
        required: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

# One release run per tag; queued tags wait rather than racing.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: create-release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
      is_prerelease: ${{ steps.tag.outputs.is_prerelease }}
    steps:
      - name: resolve tag (env-only, no template interpolation into shell)
        id: tag
        # `inputs.tag` is interpolated via env, never directly into the shell,
        # so an arbitrary `workflow_dispatch` value cannot template-inject.
        env:
          INPUT_TAG: ${{ inputs.tag }}
          GITHUB_REF: ${{ github.ref }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG:-}" ]; then
            tag="$INPUT_TAG"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$'; then
            echo "::error::invalid tag: $tag (expected vX.Y.Z or vX.Y.Z-suffix)"
            exit 1
          fi
          version="${tag#v}"
          case "$version" in
            *-*) prerelease=true ;;
            *)   prerelease=false ;;
          esac
          {
            echo "tag=$tag"
            echo "version=$version"
            echo "is_prerelease=$prerelease"
          } >>"$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          # On push, github.ref is the tag and the default works. On
          # workflow_dispatch, github.ref is the branch the workflow was
          # dispatched from; switch to the tag so every downstream job sees
          # the same source the tag captures.
          ref: ${{ steps.tag.outputs.tag }}

      - name: cross-check Cargo.toml, tag, CHANGELOG agree
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          RELEASE_VERSION: ${{ steps.tag.outputs.version }}
          IS_PRERELEASE: ${{ steps.tag.outputs.is_prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          cargo_version=$(awk -F\" '/^version[[:space:]]*=/ {print $2; exit}' Cargo.toml)
          if [ "$cargo_version" != "$RELEASE_VERSION" ]; then
            echo "::error::Cargo.toml version ($cargo_version) does not match tag ($RELEASE_VERSION)."
            echo "::error::Bump Cargo.toml before tagging."
            exit 1
          fi
          # Pre-release tags can ship before the CHANGELOG section exists.
          # Stable tags must already have a CHANGELOG heading.
          if [ "$IS_PRERELEASE" = "false" ]; then
            if ! grep -Eq "^## \[${RELEASE_VERSION}\]" CHANGELOG.md; then
              echo "::error::CHANGELOG.md is missing a [${RELEASE_VERSION}] section heading."
              exit 1
            fi
          fi

      - name: create release (idempotent)
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          IS_PRERELEASE: ${{ steps.tag.outputs.is_prerelease }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          # `gh release view` returns 0 if the release already exists for this
          # tag; in that case the build matrix is re-running and we should not
          # re-create. Otherwise create with auto-generated notes.
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "release ${RELEASE_TAG} already exists; matrix uploads will append"
            exit 0
          fi
          flags=(--title "$RELEASE_TAG" --generate-notes)
          if [ "$IS_PRERELEASE" = "true" ]; then
            flags+=(--prerelease)
          else
            flags+=(--latest)
          fi
          gh release create "$RELEASE_TAG" "${flags[@]}"

  build:
    name: build ${{ matrix.target }}
    needs: [create-release]
    env:
      RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
      RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag }}

      # SHA-pinned per the project's release-secrets review: actions that
      # execute alongside CRATES_IO_TOKEN / GH_BUMP_TOKEN must not be
      # tag-pinned, since a compromised tag would get those secrets. Bumps
      # land via the Dependabot config in .github/dependabot.yml.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable, 2026-05
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: install cross-linker (linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: cargo build --release --locked
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} --bin llamastash --locked

      - name: verify binary is an executable for the target arch
        shell: bash
        run: |
          set -euo pipefail
          out=$(file "target/${{ matrix.target }}/release/llamastash")
          echo "$out"
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu)
              echo "$out" | grep -Eq 'ELF .*x86-64' || { echo "::error::wrong arch"; exit 1; } ;;
            aarch64-unknown-linux-gnu)
              echo "$out" | grep -Eq 'ELF .*(aarch64|ARM aarch64)' || { echo "::error::wrong arch"; exit 1; } ;;
            aarch64-apple-darwin)
              echo "$out" | grep -Eq 'Mach-O .*(arm64|aarch64)' || { echo "::error::wrong arch"; exit 1; } ;;
            x86_64-apple-darwin)
              echo "$out" | grep -Eq 'Mach-O .*x86_64' || { echo "::error::wrong arch"; exit 1; } ;;
          esac

      - name: strip binary
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            aarch64-linux-gnu-strip "target/${{ matrix.target }}/release/llamastash"
          else
            strip "target/${{ matrix.target }}/release/llamastash"
          fi

      - name: package tarball
        shell: bash
        run: |
          set -euo pipefail
          stage="llamastash-${RELEASE_VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${stage}"
          cp "target/${{ matrix.target }}/release/llamastash" "dist/${stage}/"
          cp LICENSE README.md CHANGELOG.md "dist/${stage}/"
          (cd dist && tar -czf "${stage}.tar.gz" "${stage}" \
            && shasum -a 256 "${stage}.tar.gz" >"${stage}.tar.gz.sha256")
          ls -la dist

      - name: upload assets to the existing release
        # `gh release upload` is purely additive — no create. The release is
        # already there from create-release, so the four matrix jobs cannot
        # race to create it. `--clobber` lets a workflow re-run overwrite.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" --clobber \
            dist/llamastash-${RELEASE_VERSION}-${{ matrix.target }}.tar.gz \
            dist/llamastash-${RELEASE_VERSION}-${{ matrix.target }}.tar.gz.sha256

      - name: stash sha sidecar for downstream jobs
        shell: bash
        run: |
          mkdir -p sha-stash
          cp dist/llamastash-${RELEASE_VERSION}-${{ matrix.target }}.tar.gz.sha256 sha-stash/
      - uses: actions/upload-artifact@v4
        with:
          name: sha-${{ matrix.target }}
          path: sha-stash

  publish-shasums:
    name: publish SHA256SUMS + install.sh
    needs: [create-release, build]
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
      RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag }}
          sparse-checkout: |
            scripts/install.sh
          sparse-checkout-cone-mode: false
      - uses: actions/download-artifact@v4
        with:
          pattern: sha-*
          merge-multiple: true
          path: sha-stash

      - name: build aggregate SHA256SUMS + install.sh sidecar
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          # Concatenate per-target .sha256 sidecars into a single SHA256SUMS,
          # sorted for deterministic line order across runs.
          cat sha-stash/*.tar.gz.sha256 | LC_ALL=C sort >dist/SHA256SUMS
          # Verify shape: hex(64) + whitespace + filename, exactly 4 lines.
          awk '
            NF < 2 || $1 !~ /^[a-fA-F0-9]{64}$/ {
              printf "::error::bad SHA256SUMS line: %s\n", $0 > "/dev/stderr"
              exit 1
            }
          ' dist/SHA256SUMS
          line_count=$(wc -l <dist/SHA256SUMS)
          if [ "$line_count" -ne 4 ]; then
            echo "::error::SHA256SUMS has $line_count lines; expected 4 (one per target)"
            cat dist/SHA256SUMS
            exit 1
          fi

          cp scripts/install.sh dist/install.sh
          chmod +x dist/install.sh
          (cd dist && shasum -a 256 install.sh >install.sh.sha256)
          ls -la dist

      - name: upload SHA256SUMS + install.sh + sidecar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" --clobber \
            dist/SHA256SUMS \
            dist/install.sh \
            dist/install.sh.sha256

  publish-homebrew:
    name: publish homebrew formula
    needs: [create-release, publish-shasums]
    runs-on: ubuntu-latest
    # Pre-release tags exercise the upstream chain (build + shasums) but never
    # touch external repos. Cleanup after a dry-run is `gh release delete`.
    if: needs.create-release.outputs.is_prerelease == 'false'
    env:
      RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
      RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag }}
      - uses: actions/download-artifact@v4
        with:
          pattern: sha-*
          merge-multiple: true
          path: sha-stash

      - name: extract per-target sha256s
        id: shas
        shell: bash
        run: |
          set -euo pipefail
          extract() {
            local triple="$1"
            local f="sha-stash/llamastash-${RELEASE_VERSION}-${triple}.tar.gz.sha256"
            if [ ! -f "$f" ]; then
              echo "::error::missing sha256 sidecar for ${triple}: $f" >&2
              exit 1
            fi
            awk '{print $1; exit}' "$f"
          }
          {
            echo "sha_aarch64_darwin=$(extract aarch64-apple-darwin)"
            echo "sha_x86_64_darwin=$(extract x86_64-apple-darwin)"
            echo "sha_aarch64_linux=$(extract aarch64-unknown-linux-gnu)"
            echo "sha_x86_64_linux=$(extract x86_64-unknown-linux-gnu)"
          } >>"$GITHUB_OUTPUT"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: render + validate formula
        env:
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          SHA_AARCH64_DARWIN: ${{ steps.shas.outputs.sha_aarch64_darwin }}
          SHA_X86_64_DARWIN:  ${{ steps.shas.outputs.sha_x86_64_darwin }}
          SHA_AARCH64_LINUX:  ${{ steps.shas.outputs.sha_aarch64_linux }}
          SHA_X86_64_LINUX:   ${{ steps.shas.outputs.sha_x86_64_linux }}
        run: |
          set -euo pipefail
          python3 deployment/homebrew/packager.py \
            "$RELEASE_VERSION" \
            deployment/homebrew/llamastash.rb.template \
            llamastash.rb \
            "$SHA_AARCH64_DARWIN" \
            "$SHA_X86_64_DARWIN" \
            "$SHA_AARCH64_LINUX" \
            "$SHA_X86_64_LINUX"

      - name: brew style (catches template regressions before push)
        run: |
          set -euo pipefail
          # Linuxbrew installs to /home/linuxbrew/.linuxbrew/bin which is not
          # on $PATH by default on the runner.
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" </dev/null
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          brew style llamastash.rb

      - name: clone + push tap (token via GIT_ASKPASS, retry on non-fast-forward)
        env:
          GH_BUMP_TOKEN: ${{ secrets.GH_BUMP_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          if [ -z "${GH_BUMP_TOKEN:-}" ]; then
            echo "::error::GH_BUMP_TOKEN secret is unset; cannot push to tap repo"
            exit 1
          fi

          # GIT_ASKPASS keeps the token out of process argv and any URL log.
          askpass_dir=$(mktemp -d)
          cat >"$askpass_dir/askpass.sh" <<'ASKPASS'
          #!/bin/sh
          printf '%s\n' "$GH_BUMP_TOKEN"
          ASKPASS
          chmod +x "$askpass_dir/askpass.sh"
          export GIT_ASKPASS="$askpass_dir/askpass.sh"

          git config --global user.email "release-bot@users.noreply.github.com"
          git config --global user.name  "llamastash-release-bot"
          git config --global credential.helper ""

          git clone "https://x-access-token@github.com/llamastash/homebrew-llamastash.git" --branch main brew
          cp llamastash.rb brew/Formula/llamastash.rb
          cd brew
          git add Formula/llamastash.rb
          if git diff-index --quiet HEAD; then
            echo "tap already up to date for ${RELEASE_TAG}; nothing to commit"
            exit 0
          fi
          git commit -m "chore(formula): bump llamastash to ${RELEASE_TAG}"

          # Retry push with pull --rebase on non-fast-forward (concurrent
          # human edit to the tap repo's main during the release window).
          for attempt in 1 2 3; do
            if git push origin main; then
              exit 0
            fi
            echo "push attempt ${attempt} failed; pulling --rebase and retrying"
            git pull --rebase origin main
            sleep $((attempt * 5))
          done
          echo "::error::tap push failed after 3 attempts; inspect manually"
          exit 1

  publish-site:
    name: publish site install.sh mirror
    needs: [create-release, publish-shasums]
    runs-on: ubuntu-latest
    if: needs.create-release.outputs.is_prerelease == 'false'
    env:
      RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
      RELEASE_TAG: ${{ needs.create-release.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag }}

      - name: download install.sh + sidecar from the release (with retry)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p stage
          # GH Releases asset propagation can lag a few seconds behind the
          # publish-shasums upload. Retry briefly before failing.
          for attempt in 1 2 3 4 5; do
            if gh release download "$RELEASE_TAG" \
                 --repo "${{ github.repository }}" \
                 --pattern install.sh \
                 --pattern install.sh.sha256 \
                 --dir stage \
                 --clobber; then
              break
            fi
            echo "download attempt ${attempt} failed; sleeping ${attempt}s"
            sleep "$attempt"
          done
          (cd stage && sha256sum -c install.sh.sha256)

      - name: clone + push site (token via GIT_ASKPASS, retry on non-fast-forward)
        env:
          GH_BUMP_TOKEN: ${{ secrets.GH_BUMP_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          set -euo pipefail
          if [ -z "${GH_BUMP_TOKEN:-}" ]; then
            echo "::error::GH_BUMP_TOKEN secret is unset; cannot push to site repo"
            exit 1
          fi

          askpass_dir=$(mktemp -d)
          cat >"$askpass_dir/askpass.sh" <<'ASKPASS'
          #!/bin/sh
          printf '%s\n' "$GH_BUMP_TOKEN"
          ASKPASS
          chmod +x "$askpass_dir/askpass.sh"
          export GIT_ASKPASS="$askpass_dir/askpass.sh"

          released_at=$(date -u +%Y-%m-%d)
          git config --global user.email "release-bot@users.noreply.github.com"
          git config --global user.name  "llamastash-release-bot"
          git config --global credential.helper ""

          git clone "https://x-access-token@github.com/llamastash/llamastash.github.io.git" --branch main site

          # Prepend a provenance header to install.sh, then RECOMPUTE the
          # sidecar so `curl .../install.sh.sha256 | sha256sum -c` against the
          # served file matches. The previous version copied the original
          # sidecar, which was computed before the header — a real verification
          # break for users.
          {
            printf '# Source: github.com/llamastash/llamastash@%s/scripts/install.sh\n' "$RELEASE_TAG"
            printf '# SHA-256 verified by .github/workflows/release.yml on %s.\n' "$released_at"
            cat stage/install.sh
          } >site/public/install.sh
          chmod +x site/public/install.sh
          (cd site/public && shasum -a 256 install.sh >install.sh.sha256)

          # Generate version.ts via a quoted heredoc + sed substitution so
          # tag/version values cannot expand inside the heredoc. The upstream
          # tag regex blocks `"` today but the indirection makes the file safe
          # against any future regex relaxation as well.
          cat >site/src/data/version.ts <<'TS_EOF'
          // Bumped on every release by .github/workflows/release.yml in the main
          // repo. Do not edit by hand.

          export const VERSION = "__VERSION__";
          export const TAG = "__TAG__";
          export const RELEASED_AT = "__RELEASED_AT__";
          TS_EOF
          # sed substitutes the placeholders with the validated values. The
          # values went through the tag regex in create-release; the dates
          # are date-formatted by `date -u`. Both are safe to inline.
          sed -i \
            -e "s|__VERSION__|${RELEASE_VERSION}|g" \
            -e "s|__TAG__|${RELEASE_TAG}|g" \
            -e "s|__RELEASED_AT__|${released_at}|g" \
            site/src/data/version.ts

          cd site
          git add public/install.sh public/install.sh.sha256 src/data/version.ts
          if git diff-index --quiet HEAD; then
            echo "site already up to date for ${RELEASE_TAG}; nothing to commit"
            exit 0
          fi
          git commit -m "chore(release): mirror install.sh for ${RELEASE_TAG}"

          for attempt in 1 2 3; do
            if git push origin main; then
              exit 0
            fi
            echo "push attempt ${attempt} failed; pulling --rebase and retrying"
            git pull --rebase origin main
            sleep $((attempt * 5))
          done
          echo "::error::site push failed after 3 attempts; inspect manually"
          exit 1

  publish-cargo:
    name: publish to crates.io
    needs: [create-release, publish-shasums]
    runs-on: ubuntu-latest
    if: needs.create-release.outputs.is_prerelease == 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable, 2026-05
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: cargo publish (retry on transient crates.io errors, idempotent on already-published)
        env:
          # Pass via env, never via --token argv, so the token never appears
          # in the process table or any future `set -x` log.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::error::CRATES_IO_TOKEN secret is unset"
            exit 1
          fi
          for attempt in 1 2 3; do
            if cargo publish --locked 2> publish.err; then
              echo "cargo publish succeeded on attempt ${attempt}"
              exit 0
            fi
            cat publish.err >&2
            # Treat "already uploaded" / "already exists" as success — happens
            # on a re-run after a workflow-level retry.
            if grep -qiE 'already uploaded|already exists' publish.err; then
              echo "crates.io reports this version is already published; treating as success"
              exit 0
            fi
            echo "cargo publish attempt ${attempt} failed; sleeping $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "::error::cargo publish failed 3 times; investigate crates.io status"
          exit 1
