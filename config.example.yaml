# LlamaStash sample configuration.
#
# Copy this file to one of the resolved locations and edit:
#
#   Linux     $XDG_CONFIG_HOME/llamastash/config.yaml
#             (fallback: ~/.config/llamastash/config.yaml)
#   macOS     ~/Library/Application Support/llamastash/config.yaml
#   Windows   %APPDATA%\llamastash\config\config.yaml
#             (i.e. C:\Users\<you>\AppData\Roaming\llamastash\config\)
#   Any OS    LLAMASTASH_CONFIG=/abs/path/to/config.yaml
#             llamastash --config /abs/path/to/config.yaml ...
#
# Every field is optional — missing keys fall back to the defaults
# documented inline. Unknown top-level keys are silently ignored so
# old configs keep working when new options land; unknown values
# within a known key (e.g. a misspelt theme name) error noisily.
#
# Each section below tags its override sources as:
#   CLI: <flag>            (--foo on the command line; if scope is
#                           narrower than "global", the subcommand is
#                           named, e.g. "daemon start --proxy-port")
#   Env: <NAME>            (environment variable read at startup)
#   (none)                 (config-only — no CLI/env mirror)
#
# Config-file selection itself:
#   CLI: --config PATH     Env: LLAMASTASH_CONFIG

# ─── Theme ────────────────────────────────────────────────────────
#
# Built-in themes: macchiato (default) | latte | gruvbox-dark |
# solarized-dark | mono. Aliases: catppuccin-macchiato,
# catppuccin-latte, gruvbox, solarized, monochrome.
#
# Set to `custom` to activate the `custom_theme:` block below; if
# you set `custom` without supplying `custom_theme:`, LlamaStash logs
# a warning and falls back to macchiato.
#
# Sources — CLI: (none) · Env: (none). Cycle live in the TUI with `t`.
theme: macchiato

# ─── Custom theme (optional) ──────────────────────────────────────
#
# When `theme: custom`, this block defines the palette. Every slot
# is optional — missing slots inherit from `base` (or macchiato if
# `base` is omitted). Bad colour values log a warning and the slot
# falls back to the base value rather than dropping the whole theme.
#
# Colour syntax (case-insensitive):
#   - 6-digit hex: "#1A1B26", "#c0caf5"
#   - ANSI names: black, red, green, yellow, blue, magenta, cyan,
#                 gray/grey, darkgray, lightred, lightgreen,
#                 lightyellow, lightblue, lightmagenta, lightcyan,
#                 white
#   - "reset" / "default" — fall through to terminal default
#
# Strings containing `#` must be quoted in YAML.
#
# Sources — CLI: (none) · Env: (none). Config-only.
#
# custom_theme:
#   base: macchiato            # built-in palette to inherit from
#   is_dark: true              # affects the title row text choices
#   bg: "#1A1B26"              # panel background
#   fg: "#C0CAF5"              # primary text
#   accent: "#BB9AF7"          # panel borders + active tab strip
#   on_accent: "#1A1B26"       # text drawn on top of accent (title bar)
#   panel_title: "#FFC777"     # block-title text — yellow in stock themes
#   label: "#7DCFFF"           # in-panel label prefixes — blue in stock themes
#   muted: "#565F89"           # secondary text + hint separators
#   selection: "#283457"       # subtle surface tone (reserved)
#   highlight: "#FFC777"       # selected row background in the Models list
#   success: "#9ECE6A"
#   warning: "#FF9E64"
#   error:   "#F7768E"
#   status_loading:  "#FFC777"
#   status_ready:    "#9ECE6A"
#   status_error:    "#F7768E"
#   status_stopped:  "#565F89"
#   status_external: "#7DCFFF"

# ─── Model paths ──────────────────────────────────────────────────
#
# Extra directories to scan for .gguf files (recursive). Paths from
# every active source are merged before the daemon discovery sweep.
#
# Sources — CLI: -p / --model-path DIR (repeatable, global) ·
#           Env: LLAMASTASH_MODEL_PATHS — `:`-separated on POSIX,
#                `;`-separated on Windows (std::env::split_paths
#                semantics; empty entries are skipped).
model_paths: []
# - /opt/llms
# - /mnt/data/gguf

# ─── Default cache scanning ───────────────────────────────────────
#
# When `model_paths` is empty (and `--model-path` / env vars don't
# add any), LlamaStash walks the well-known caches below. Flip a
# bucket to `true` to disable scanning that cache without disabling
# the others. The whole sweep can be dropped via the `disable_scan`
# key below.
#
# Cache locations:
#   HuggingFace  ~/.cache/huggingface/hub
#                ~/Library/Caches/huggingface/hub (macOS)
#   Ollama       ~/.ollama/models
#   LM Studio    ~/.lmstudio/models, ~/.cache/lm-studio/models
#                ~/Library/Caches/LMStudio/models (macOS)
#
# Sources — CLI: (none, per bucket) · Env: (none, per bucket). The
# global `--no-scan` / `LLAMASTASH_NO_SCAN=1` toggle below skips all
# three buckets at once.
disable_default_cache_paths:
  huggingface: false
  ollama: false
  lm_studio: false

# Disable filesystem scanning entirely. Useful when you've supplied
# `model_paths` and don't want the daemon walking caches in
# parallel. Errors at startup if no `model_paths` and no `-p` flag
# either — LlamaStash refuses to start with nothing to list.
#
# Sources — CLI: --no-scan (global) · Env: LLAMASTASH_NO_SCAN=1.
disable_scan: false

# ─── Daemon ───────────────────────────────────────────────────────
#
# Inclusive TCP port range the supervisor picks from when launching
# `llama-server`. Defaults: 41100..=41300. Tighten this if other
# tooling on the box owns adjacent ports.
#
# Sources — CLI: (none) · Env: (none). Config-only.
port_range:
  start: 41100
  end: 41300

# Path to the `llama-server` binary. Leave commented out to fall
# back to `$PATH`.
#
# Sources — CLI: --llama-server PATH (global) ·
#           Env: LLAMASTASH_LLAMA_SERVER=PATH.
# llama_server_path: /usr/local/bin/llama-server

# Additional `llama-server` binaries to probe for launch devices.
# Each is queried with `--list-devices` at daemon start; the union of
# their devices (deduped by selector, first-listed wins) becomes the
# launch device catalog — so one install can offer CUDA / ROCm /
# Vulkan launches by pointing at the matching single-backend builds.
# When `llama_server_path` is also set it's the default binary (auto /
# no-device launches) and is prepended to this probe set. Binaries are
# not labelled by backend here; the backend is inferred from each
# binary's own device names (`CUDA0`, `ROCm0`, `Vulkan0`).
#
# Sources — CLI: (none) · Env: (none). Config-only.
# llama_server_paths:
#   - /opt/builds/cuda/llama-server
#   - /opt/builds/rocm/llama-server

# Per-launch health-probe timeout in seconds. 120s suits a typical
# 7B–13B model on local NVMe; raise to ~600 for 70B+ on slow disks
# if you hit `health probe timeout (last status 503)` on legitimate
# loads.
#
# Sources — CLI: (none) · Env: (none). Config-only.
probe_timeout_secs: 120

# ─── Auto-fit launch behaviour ────────────────────────────────────
#
# How a knob you never touched (and that no preset / arch-default
# supplies) is seeded at launch:
#   - auto      (default): delegate it to llama-server's `--fit`, which
#               places layers + sizes context for the available memory.
#   - inherited: leave it unset (pre-Auto behaviour) — llama-server
#               falls back to its own built-in default.
# A knob you *did* set (CLI, TUI, preset, arch-default) always wins;
# this only chooses the seed for the untouched ones.
#
# Sources — CLI: (none) · Env: LLAMASTASH_DEFAULT_LAUNCH_MODE=auto|inherited.
default_launch_mode: auto

# Minimum context window passed to fit-capable llama-server as
# `--fit-ctx`, so `--fit` never collapses the window below a usable
# size on unified-memory hosts. A pinned `--ctx` overrides this.
# Validated to 1..=1048576; out-of-range values fall back to 16384.
#
# Sources — CLI: (none) · Env: LLAMASTASH_FIT_CTX_FLOOR=TOKENS.
fit_ctx_floor: 16384

# Strict-fit mode: when true, refuse a launch that `--fit` could not
# place as requested rather than letting it run degraded. Off by
# default (degrade-and-warn).
#
# Sources — CLI: (none) · Env: LLAMASTASH_STRICT_FIT=1.
strict_fit: false

# Pass `--jinja` to llama-server on every launch (default: true). The
# Jinja chat-template engine is what makes tool calling / function
# calling work on both the OpenAI `/v1/chat/completions` and the
# Anthropic `/v1/messages` surfaces. Set false to fall back to
# llama-server's built-in chat template (no per-launch `--jinja`).
# The reasoning toggle still forces `--jinja` on for launches it
# applies to, regardless of this setting.
#
# Sources — CLI: (none) · Env: (none, config-only).
jinja: true

# ─── ASCII glyph fallback ─────────────────────────────────────────
#
# Render the TUI with a 7-bit ASCII glyph set instead of the default
# Unicode house style (geometric status dots ● ◐ ◌, severity markers
# △ ▲, box-drawing borders ┌─┐). Turn this on for terminals or fonts
# that show the Unicode set as tofu (legacy conhost, minimal SSH
# fonts, some CI ptys). Severity stays double-encoded — warning (!)
# and critical (*) keep distinct shapes so the tier survives a
# colour-stripped terminal. Off by default.
#
# Sources — Env: LLAMASTASH_ASCII=1 (wins over this field) ·
#           CLI: (none).
ascii_glyphs: false

# ─── Mouse focus ──────────────────────────────────────────────────
#
# Opt into terminal mouse capture. When enabled:
#   - Left-click on the Models list, the right pane, or a tab label
#     (Settings/Logs/Chat/Embed/Rerank) moves focus / switches tab.
#   - Wheel up/down replays the ↑/↓ action in the current focus —
#     same as pressing k/j (or arrows). Click into a pane first to
#     redirect the wheel there.
#   - Drag / Up / motion are filtered out so the terminal's bypass
#     modifier (Shift on iTerm2/Alacritty/foot/wezterm, Option on
#     Apple Terminal) can still highlight text for native copy.
# Off by default — capturing the mouse pre-empts the terminal's
# native click-and-drag text selection.
#
# For an always-on setup without editing this file, alias the
# binary: `alias llamastash='llamastash --mouse-focus'`.
#
# Sources — CLI: --mouse-focus (global, OR-ed with this field) ·
#           Env: (none).
mouse_focus: false

# ─── Left/right pane split cycle (Alt+L) ──────────────────────────
#
# Left (Models list) pane width percentages that Alt+L cycles through
# in wide mode. Each press advances to the next slot and wraps; the
# right pane takes the remainder (100 - value). 100 hides the right
# pane, 0 hides the list. Slot 0 is the startup default — the pick is
# session-only and resets to slot 0 on restart. At most 5 slots are
# honored (extras ignored); each is clamped to 0..=100; an empty list
# falls back to the factory default below. Compact (narrow) terminals
# keep their adaptive split regardless.
#
# Sources — Key: Alt+L (⌥L on macOS) · CLI/Env: (none).
left_pane_ratios: [65, 100, 50, 35, 0]

# ─── Proxy (OpenAI-compatible listener) ───────────────────────────
#
# A loopback HTTP/1.1 listener that speaks the OpenAI REST shape on
# one stable URL so any agent (OpenCode, Pi, OpenAI SDKs, …) can
# route every discovered model through `body.model`. The full
# endpoint table, error envelopes, response headers (notably the
# fallback-path `x-llamastash-served-by` /
# `x-llamastash-fallback-reason`), and the manual smoke runbook live
# in `docs/usage.md §Proxy (OpenAI-compatible listener)`.
#
# Auth posture: loopback + keyless by default. With the factory
# `host` (unset → 127.0.0.1) the listener binds loopback only and
# ignores every authentication header — same-machine single-user
# threat model. Setting `host` to a routable address opts the proxy
# *data plane* into LAN exposure; that bind then requires `api_key`
# (auto-generated and printed once if unset) unless `insecure_no_auth`
# waives it. The control plane and `llama-server` children always stay
# loopback. TLS is still deferred — LAN mode is plaintext.
#
# Unknown keys inside this block are rejected loudly (no
# silently-tolerated typos).
proxy:
  # Toggle the listener. When false the daemon still runs but no
  # port is bound and `status.proxy.status` reports "disabled".
  #
  # Sources — CLI: (none) · Env: (none).
  enabled: true

  # Ollama drop-in mode. When true, `GET /` returns the byte-exact
  # `"Ollama is running"` string the official `ollama` CLI checks
  # for, and the default port shifts to 11434 (Ollama's well-known
  # port). When false (the default), the identity is `"LlamaStash is
  # running"` and the default port is 11435 so llamastash coexists
  # with an installed Ollama daemon.
  #
  # Enable when the goal is "this tool that natively speaks Ollama
  # just works against llamastash". Leave off when the goal is "run
  # alongside Ollama on the same box".
  #
  # Sources — CLI: daemon start --ollama-compat ·
  #           Env: LLAMASTASH_OLLAMA_COMPAT=1.
  # (Three sources are OR-ed; any one of them enables the mode.)
  ollama_compat: false

  # TCP port on 127.0.0.1. Comment out to use the mode default
  # (11434 when `ollama_compat: true`, 11435 otherwise). Set to pin a
  # specific port regardless of mode. If the base port is taken the
  # listener walks `port..=port+5` and binds the first free slot;
  # when all six slots are taken the daemon stays up and reports
  # `status.proxy.status: "port_in_use"` (the proxy does not roam
  # outside the scan window — that would break the "single stable
  # URL" promise). Edit `port` and restart to recover.
  #
  # Sources — CLI: daemon start --proxy-port N (beats this field;
  #           use `--proxy-port 0` to bind an ephemeral port — read
  #           the actual address from `llamastash status --json |
  #           jq .proxy.listen`) · Env: (none).
  # port: 11435

  # Family-MRU fallback behaviour when a requested model fails to
  # auto-start. Default `true`: the proxy serves the request from
  # another Ready supervisor (same arch first, then any) and stamps
  # `x-llamastash-fallback-reason` on the response. Set to `false`
  # to return a 503 `launch_failed` envelope instead — useful when a
  # client must not silently receive a response from a different
  # model (e.g. an embedding client that would mis-interpret a
  # chat-completion payload).
  #
  # Sources — CLI: daemon start --no-proxy-fallback (disable only,
  #           cannot re-enable from the CLI) ·
  #           Env: LLAMASTASH_NO_PROXY_FALLBACK=1 (disable only).
  # (Any of the three "disable" signals turns it off — re-enabling
  # requires unsetting all of them and `fallback_enabled: true`.)
  fallback_enabled: true

  # Seconds hyper waits for a client to finish sending request
  # headers before dropping the connection. Bounds the impact of
  # partial-request clients (crashed agents leaving sockets
  # half-open, slow-loris-style mistakes). Raise to 120 if a client
  # legitimately streams headers across a slow link.
  #
  # Sources — CLI: (none) · Env: (none).
  header_read_timeout_secs: 30

  # Idle-TTL eviction for proxy-auto-started supervisors. After
  # `idle_ttl_secs` of no inbound request *and* no in-flight stream,
  # the daemon's eviction sweeper calls `model.stop(5s grace)` so a
  # long-running daemon doesn't pin VRAM on models nobody is using.
  # `0` disables eviction entirely; supervisors stay resident until
  # an explicit `stop_model`. Only auto-start supervisors are
  # evictable — explicit `llamastash start` / TUI launches are
  # treated as durable user intent and stay resident regardless.
  #
  # Default: 1800 (30 min).
  #
  # Sources — CLI: (none) · Env: (none).
  idle_ttl_secs: 1800

  # Address the proxy data plane binds. Comment out (the default) to
  # keep the listener on 127.0.0.1 — loopback-only, the historical
  # posture. Set a routable address (`0.0.0.0`, a specific NIC IP, or
  # an IPv6 address like `::`) to expose the proxy on the LAN. A
  # non-loopback bind requires `api_key` (auto-generated if unset)
  # unless `insecure_no_auth: true`; otherwise the daemon refuses to
  # bind the proxy (the daemon itself still runs). Only the proxy
  # moves — the control plane and `llama-server` children stay
  # loopback regardless.
  #
  # Sources — CLI: daemon start --proxy-host IP (beats env + config) ·
  #           Env: LLAMASTASH_PROXY_HOST. Precedence: CLI > env > config.
  # host: 0.0.0.0

  # Bearer token required on the proxy's data routes (`/v1/*`,
  # `/api/*`) when set. Comment out (the default) for no auth — the
  # loopback-only, same-UID posture. Auto-provisioned, printed once,
  # and persisted back here the first time a LAN bind is enabled
  # without an existing key. Enforced whenever set, regardless of bind
  # host (a key is honored even on loopback). Browsers may also send it
  # as HTTP Basic (key as the password) for the `/ui` surface.
  #
  # Sources — CLI: (none) · Env: LLAMASTASH_PROXY_API_KEY (takes
  #           precedence and is never written back to disk — for
  #           containers / secret managers). Secret: never logged;
  #           status reports only whether auth is enforced.
  # api_key: sk-llamastash-...

  # Allow a non-loopback `host` with no `api_key` (unauthenticated LAN
  # proxy). Default false — the daemon refuses such a bind. Set true
  # only when you deliberately want an open LAN proxy on a trusted,
  # firewalled network. A loud warning prints either way when the proxy
  # binds a non-loopback address.
  #
  # Sources — CLI: daemon start --insecure-no-auth ·
  #           Env: LLAMASTASH_PROXY_INSECURE_NO_AUTH=1.
  # (Config field, CLI flag, and env are OR-ed — any one waives auth.)
  insecure_no_auth: false

# ─── Lemonade (NPU / multi-engine backend) [EXPERIMENTAL] ─────────
#
# EXPERIMENTAL: behaviour and these keys may change. A second backend
# for engines llama.cpp can't reach — NPU inference on AMD Ryzen AI /
# XDNA, plus ROCm / ONNX / others — via the Lemonade (`lemond`) managed
# umbrella.
#
# Default-on when the `lemond` binary resolves (like ds4): if `lemond`
# is on PATH (or `binary` below points at it) the daemon runs Lemonade
# discovery + umbrella unless `enabled: false`. Zero footprint when the
# binary is absent. llamastash never installs `lemond` — you set it up
# yourself and point us at it (see docs/lemonade-setup.md).
#
# Unknown keys inside this block are rejected loudly (no
# silently-tolerated typos).
lemonade:
  # Force the backend on or off. Tri-state — leave unset for the default
  # (auto: on whenever `lemond` resolves), `true` to force on, `false`
  # to force off even when the binary is present.
  #
  # Sources — CLI: daemon start --lemonade (force on) ·
  #           Env: LLAMASTASH_LEMONADE=1 (force on).
  # (The flag and env only force on; `false` here still wins as an
  # explicit off.)
  # enabled: true

  # Explicit path to the user's `lemond` binary. Comment out to fall
  # back to a `lemond` (or `lemonade`) found on `$PATH`.
  #
  # Sources — CLI: (none) · Env: (none). Config-only.
  # binary: /opt/lemonade/lemond

  # Loopback port the `lemond` umbrella binds and that discovery probes
  # for the model list. Defaults to Lemonade's own default (13305).
  #
  # Sources — CLI: (none) · Env: (none). Config-only.
  port: 13305

# ─── ds4 (DwarfStar) — DeepSeek V4 backend [EXPERIMENTAL] ─────────
#
# EXPERIMENTAL: new and lightly road-tested; keys and defaults below may
# change between releases. llama.cpp stays the stable default and runs
# DeepSeek-V4 too, so ds4 is never required (set `enabled: false` or use
# `--backend llamacpp` to opt out).
#
# A third backend that runs antirez's `ds4-server` for the DeepSeek-V4
# Flash/PRO GGUFs. A ds4-compatible GGUF auto-routes to ds4 when the
# binary resolves; anything else (and any incompatible quant) stays on
# llama.cpp — ds4 is preferred, never required. You supply the binary:
# build ds4-server from https://github.com/antirez/ds4 and either put it
# on PATH or point `binary` at it. Zero footprint when it's absent.
#
# Unknown keys inside this block are rejected loudly (no
# silently-tolerated typos). See docs/usage.md#ds4-backend.
#
# ds4:
  # Force the backend on or off. Tri-state — leave unset for the
  # default (auto: on whenever `ds4-server` resolves), `true` to force
  # on, `false` to force off even when the binary is present.
  #
  # Sources — CLI: daemon start --ds4 (force on) ·
  #           Env: LLAMASTASH_DS4=1 (force on).
  # (The flag and env only force on; `false` here still wins as an
  # explicit off.)
  # enabled: true

  # Explicit path to the `ds4-server` binary. Comment out to fall back
  # to a `ds4-server` found on `$PATH`.
  #
  # Sources — CLI: (none) · Env: (none). Config-only.
  # binary: /opt/ds4/ds4-server

# ─── Keybindings ──────────────────────────────────────────────────
#
# Override the default keymap. Each entry maps an action name
# (snake_case or kebab-case) to a key spec.
#
# Key spec dialect:
#   - bare character:           q  ?  /  Q
#   - modifier chain:           ctrl+q, shift+tab, alt+enter,
#                               ctrl+shift+r
#   - named keys:               enter, esc, tab, backtab, space,
#                               backspace, up, down, left, right,
#                               home, end, pgup, pgdn, del, ins,
#                               f1..f12
#
# Override semantics: the action's existing default binding(s) are
# removed and the new binding is inserted with the same focus
# scope. Any binding that previously used the new key spec inside
# those scopes is dropped to keep dispatch unambiguous. Unknown
# action names and unparseable specs log a warning at startup —
# the rebind is dropped, the rest of the keymap survives.
#
# Each line below is the action's *default* binding. Uncomment and
# edit the right-hand side to rebind. Actions with more than one
# default chord show the secondary key in a trailing comment.
#
# Sources — CLI: (none) · Env: (none). Config-only.
keybindings: {}
#  # ── Global / always-on ─────────────────────────────────────
#  quit: q                            # also: ctrl+c
#  toggle_help: '?'
#  cycle_theme: t
#  cycle_theme_prev: T                # i.e. shift+t
#
#  # ── Daemon-level (destructive — all behind Ctrl) ──────────
#  restart_daemon: ctrl+r
#  kill_daemon: ctrl+k
#  stop_model: ctrl+s
#  delete_model: ctrl+d
#  cancel_download: ctrl+x
#
#  # ── Motion (Models list + right pane) ─────────────────────
#  move_up: up                        # vi alias: k
#  move_down: down                    # vi alias: j
#  page_up: pgup
#  page_down: pgdn
#  go_top: g                          # also: home
#  go_bottom: G                       # also: end
#
#  # ── Pane navigation ────────────────────────────────────────
#  next_focus: tab                    # nav alias: l
#  prev_focus: shift+tab              # nav alias: h
#
#  # ── Shift-letter quick-jumps to surfaces ──────────────────
#  focus_list: M                      # i.e. shift+m
#  focus_logs_tab: L
#  focus_chat_tab: C                  # also: E, R (mnemonic aliases)
#  focus_settings_tab: S
#  open_hf_dialog: P                  # i.e. shift+p — "Pull"
#
#  # ── Models list local actions ─────────────────────────────
#  open_filter: '/'
#  clear_filter: esc                  # in filter focus
#  toggle_favorite: f
#  open_launch_picker: enter          # in list focus
#  yank_url: u
#  yank_curl: c                       # vi alias: y (yank)
#  yank_path: p
#
#  # ── Right pane (Logs / Settings) ──────────────────────────
#  enter_edit: e
#  exit_edit: esc                     # in input focuses
#  toggle_auto_scroll: s              # logs tab
#  cycle_value_next: right            # settings tab
#  cycle_value_prev: left
#
#  # ── Submit / cancel (Enter / Esc in multi-focus scopes) ───
#  submit: enter                      # filter, right pane, embed, rerank, confirm popup, HF dialog
#  send_chat: enter                   # chat input
#  insert_newline: shift+enter        # all input focuses (kitty-protocol terminals)
#  cancel: esc                        # confirm popup, HF dialog
#
#  # ── Field cycling (rerank input) ──────────────────────────
#  next_field: down
#  prev_field: up
#
#  # ── Chat-only chord ───────────────────────────────────────
#  toggle_think_collapse: ctrl+r      # chat input

# ─── arch_defaults ────────────────────────────────────────────────
#
# User escape hatch over the built-in `(architecture, gpu_backend)
# → TypedKnobs` table that ships in the binary. Keys are GGUF
# `general.architecture` strings (e.g. `qwen2`, `llama`, `llama3`,
# `gemma`, `gemma3`, `phi`, `qwen3`). Each value is a TypedKnobs
# partial — only the fields you want to override need to be
# specified. At launch time the daemon walks
# `preset > last_params > arch_defaults > built-in table >
# llama-server` and picks the first non-null per field.
#
# Field names match llama-server's flag names (snake_case): each is
# grep-able directly from the binary's log output. The full set of
# 14 supported knobs is enumerated below for one example arch; copy
# only the lines you intend to override.
#
# Sources — CLI: (none) · Env: (none). Config-only. (The per-launch
# `llamastash start --ctx N` flag and the in-TUI Settings tab feed
# the `last_params` and `preset` layers above this one, not this map.)
#
# arch_defaults:
#   qwen2:
#     # ── Context & scheduling ──────────────────────────────
#     ctx: 8192                      # → -c / --ctx-size
#     parallel: 4                    # → --parallel (request slots)
#     batch_size: 2048               # → --batch-size
#     ubatch_size: 512               # → --ubatch-size (physical)
#     keep: 0                        # → --keep (context shift)
#     rope_freq_scale: 1.0           # → --rope-freq-scale
#     # ── Compute placement ─────────────────────────────────
#     n_gpu_layers: 99               # → --n-gpu-layers (99 = all)
#     n_cpu_moe: 12                  # → --n-cpu-moe (MoE layers on CPU)
#     threads: 8                     # → --threads (CPU)
#     flash_attn: true               # → --flash-attn
#     # ── Multi-GPU placement (only meaningful with >1 GPU) ──
#     tensor_split: "3,1"            # → --tensor-split (75% GPU0 / 25% GPU1)
#     main_gpu: 0                    # → --main-gpu (primary GPU)
#     split_mode: layer              # → --split-mode (none|layer|row)
#     # device: Vulkan0              # → --device (pin to one selector)
#     # ── KV cache quantisation ─────────────────────────────
#     cache_type_k: q8_0             # → --cache-type-k
#     cache_type_v: q8_0             # → --cache-type-v
#     # ── Memory residency ──────────────────────────────────
#     mlock: false                   # → --mlock (lock in RAM)
#     no_mmap: false                 # → --no-mmap (full RAM load)
#     # ── Chat template ─────────────────────────────────────
#     reasoning: false               # true bundles --jinja
#                                    #   --reasoning-format deepseek
#   llama:
#     threads: 8
#     parallel: 4

# ─── presets ──────────────────────────────────────────────────────
#
# Named launch presets — the single writable home for presets. The CLI
# (`llamastash presets save/list/show/delete`) and the TUI (`Ctrl+P`)
# write here; you can also hand-author entries (and comments). Edits
# the app makes preserve every surrounding comment, so this section is
# yours to annotate.
#
# Each top-level key is classified against your discovered models when a
# preset is resolved:
#   • names a model — by file basename, or full path — → a "per-model"
#     preset. A basename key applies to EVERY discovered model with that
#     filename (the same GGUF cached in two roots shares one preset set);
#     a full-path key pins to that one file.
#   • otherwise read as a GGUF `general.architecture` → applies to every
#     model of that arch (an "arch" preset, hand-authored only).
# A model's effective set is its per-model entries ∪ its arch entries;
# on a name collision the per-model entry wins.
#
# `entries` is a map keyed by preset name. Each entry holds the same
# typed knobs as `arch_defaults` (flat: `ctx`, `flash_attn`, `threads`,
# …) plus an optional `mode` (chat | embedding | rerank) and an `extras`
# argv tail. Apply one with `llamastash start <model> --preset <name>`.
#
# A knob set to `auto` delegates that knob to llama-server's `--fit`
# (e.g. `n_gpu_layers: auto`). `auto` is a reserved token, so to set a
# knob to the *literal* string value `auto`, use the escape
# `{ value: auto }`. The app writes entries in block style (shown below);
# flow style (`{ ctx: 8192 }`) is also accepted when you hand-author.
#
# `default:` is the model's standing launch config. It is hand-edited only
# (there is no set-default command) and is ignored if it names an entry that
# doesn't exist. It AUTO-APPLIES on any launch where you don't pick something:
# a plain `start <model>` with no `--preset`, and proxy auto-start. Precedence
# is: your inline flags > default preset > last-used params > arch defaults >
# fit. Two reserved forms: `default: <name>` applies that preset; `default:
# auto` launches pure fit (ignores last-used + the default). With no `default:`
# set, last-used stays the implicit default. Pick a preset explicitly with
# `start --preset <name>`; `start --preset auto` is the clean "fit fresh"
# per-launch override. In the TUI the cycle marks the default stop `(default)`
# and opens on it.
#
# Changes the app writes are live immediately; hand-edits here need a
# `llamastash daemon restart` to be picked up.
#
# presets:
#   # per-model preset, keyed by the GGUF file's basename
#   Qwen3-Coder-30B-Q4_K_M.gguf:
#     default: long-ctx               # standing default; auto-applies on a plain start
#                                     # (use `default: auto` for pure fit instead)
#     entries:
#       short-ctx:
#         ctx: 8192
#       long-ctx:
#         ctx: 65536
#         flash_attn: true
#         n_gpu_layers: auto          # delegate this knob to --fit
#       embed:
#         mode: embedding
#         ctx: 4096
#         extras:
#           - --rope-freq-base
#           - "10000"
#   # arch preset, keyed by `general.architecture` — applies to every
#   # qwen3 model that has no per-model entry of the same name
#   qwen3:
#     entries:
#       balanced:
#         ctx: 16384
